<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Lily Music"/>
<meta name="theme-color" content="#000000"/>
<link rel="manifest" href="/static/manifest.json"/>
<title>Lily Music</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#121212;--bg2:#181818;--bg3:#232323;--hover:#2a2a2a;--sel:#333;
  --green:#1DB954;--green2:#1ed760;--green-glow:rgba(29,185,84,.25);
  --white:#fff;--muted:#b3b3b3;--dim:#6a6a6a;--black:#000;
  --red:#e91429;--sidebar-w:240px;--player-h:90px;--bnav-h:56px;
  --safe-b:env(safe-area-inset-bottom,0px);--radius:4px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Figtree',sans-serif;background:var(--black);color:var(--white);font-size:14px;overscroll-behavior:none}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#535353;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:#7a7a7a}

.app{display:grid;grid-template-rows:1fr var(--player-h);grid-template-columns:var(--sidebar-w) 1fr;height:100svh;height:100vh;background:var(--black);overflow:hidden}
.sidebar-wrap{grid-row:1;grid-column:1;background:var(--black);display:flex;flex-direction:column;overflow:hidden;padding:8px;gap:2px}
.main-wrap{grid-row:1;grid-column:2;background:var(--bg);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;margin:8px 8px 8px 0}
.player-wrap{grid-row:2;grid-column:1/3;background:#181818;border-top:1px solid #2a2a2a}

.sidebar-nav{background:var(--bg2);border-radius:8px;padding:6px 0;flex-shrink:0}
.sidebar-lib{background:var(--bg2);border-radius:8px;flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.logo{display:flex;align-items:center;gap:10px;padding:18px 20px 14px;font-size:16px;font-weight:900;letter-spacing:-.3px;color:var(--white)}
.nav-link{display:flex;align-items:center;gap:16px;padding:10px 20px;border:none;background:transparent;color:var(--muted);font-family:'Figtree',sans-serif;font-size:13px;font-weight:700;cursor:pointer;width:100%;text-align:left;transition:color .15s;letter-spacing:.3px}
.nav-link:hover{color:var(--white)}.nav-link.active{color:var(--white)}
.nav-icon{width:24px;height:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.lib-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 8px;flex-shrink:0}
.lib-label{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.lib-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .15s}
.lib-btn:hover{color:var(--white);background:var(--hover)}
.playlist-list{flex:1;overflow-y:auto;padding:0 8px 8px}
.pl-item{display:flex;align-items:center;gap:12px;padding:8px;border-radius:4px;cursor:pointer;transition:background .12s}
.pl-item:hover{background:var(--hover)}.pl-item.active{background:var(--sel)}
.pl-icon{width:40px;height:40px;border-radius:4px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;color:var(--muted);overflow:hidden}
.pl-info{min-width:0}.pl-name{font-size:13px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-meta{font-size:11px;color:var(--muted);margin-top:2px}
.sidebar-add-btns{padding:8px;display:flex;gap:4px}
.sidebar-add-btn{flex:1;background:transparent;border:1px dashed #3a3a3a;border-radius:4px;color:var(--dim);font-family:'Figtree',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;padding:8px;cursor:pointer;transition:all .15s;text-align:center}
.sidebar-add-btn:hover{color:var(--white);border-color:var(--muted);background:var(--hover)}

.topbar{display:flex;align-items:center;padding:16px 24px 0;gap:16px;flex-shrink:0}
.topbar-nav-btn{background:#2a2a2a;border:none;color:var(--white);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:background .15s}
.topbar-nav-btn:hover{background:#3a3a3a}
.folder-btn{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:20px;background:transparent;border:1px solid #727272;color:var(--white);font-family:'Figtree',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.3px}
.folder-btn:hover{border-color:var(--white)}.folder-btn.set{border-color:var(--green);color:var(--green)}
.offline-badge{padding:4px 12px;border-radius:12px;background:var(--red);color:var(--white);font-size:11px;font-weight:700;letter-spacing:.5px}

.page{flex:1;overflow-y:auto;padding:0 24px 24px;-webkit-overflow-scrolling:touch}
.page-fade{animation:fade-in .3s ease}
@keyframes fade-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.hero-bg{height:240px;min-height:240px;display:flex;align-items:flex-end;padding:24px;margin:0 -24px 24px;position:relative;overflow:hidden;flex-shrink:0}
.hero-content{position:relative;z-index:1}
.hero-greeting{font-size:32px;font-weight:900;letter-spacing:-1px}
.hero-sub{font-size:13px;color:rgba(255,255,255,.7);margin-top:4px;font-weight:500}

.section-title{font-size:22px;font-weight:900;color:var(--white);margin-bottom:16px;margin-top:8px;letter-spacing:-.5px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:32px}
.track-card{background:var(--bg2);border-radius:8px;padding:16px;cursor:pointer;transition:background .2s;position:relative}
.track-card:hover{background:#282828}.track-card:hover .card-play-btn{opacity:1;transform:translateY(0)}
.card-art{width:100%;aspect-ratio:1;border-radius:4px;object-fit:cover;display:block;background:var(--bg3);margin-bottom:12px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.card-art-ph{width:100%;aspect-ratio:1;border-radius:4px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:12px;color:var(--dim)}
.card-title{font-size:13px;font-weight:700;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.card-artist{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-play-btn{position:absolute;bottom:72px;right:16px;width:48px;height:48px;border-radius:50%;background:var(--green);border:none;color:var(--black);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 16px rgba(0,0,0,.4);opacity:0;transform:translateY(8px);transition:all .2s}
.card-play-btn:hover{transform:translateY(0) scale(1.06)!important;background:var(--green2)}

.track-row{display:grid;grid-template-columns:40px 1fr 1fr 1fr 70px 36px;padding:4px 16px;border-radius:4px;cursor:pointer;transition:background .1s;align-items:center;gap:12px}
.track-row:hover{background:var(--hover)}.track-row:hover .tr-actions{opacity:1}
.track-row.playing{background:rgba(29,185,84,.08)}.track-row.playing .tr-title{color:var(--green)}
.tr-num{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted);text-align:center}
.tr-playing-icon{display:flex;align-items:flex-end;justify-content:center;gap:2px;height:16px}
.eq-bar{width:3px;background:var(--green);border-radius:1.5px;animation:eq .6s ease-in-out infinite alternate}
.eq-bar:nth-child(2){animation-delay:.15s;animation-duration:.5s}.eq-bar:nth-child(3){animation-delay:.05s;animation-duration:.7s}
@keyframes eq{from{height:4px}to{height:15px}}
.tr-info{display:flex;align-items:center;gap:12px;min-width:0}
.tr-art{width:40px;height:40px;border-radius:2px;flex-shrink:0;overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--dim)}
.tr-details{min-width:0}
.tr-title{font-size:13px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-sub{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-text{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-dur{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);text-align:right}
.tr-actions{opacity:0;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.tr-dl-badge{font-size:11px;color:var(--green);font-weight:800}
.track-table-head{display:grid;grid-template-columns:40px 1fr 1fr 1fr 70px 36px;padding:0 16px;border-bottom:1px solid #2a2a2a;margin-bottom:4px;gap:12px}
.track-table-head span{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:8px 0}

.search-bar{display:flex;align-items:center;gap:12px;background:#fff;border-radius:24px;padding:12px 20px;max-width:480px}
.search-bar input{flex:1;border:none;outline:none;background:transparent;font-family:'Figtree',sans-serif;font-size:14px;font-weight:600;color:#000}
.search-bar input::placeholder{color:#737373}
.tabs{display:flex;border-bottom:1px solid #2a2a2a;margin-bottom:20px;flex-shrink:0}
.tab{padding:12px 20px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;border:none;background:transparent;font-family:'Figtree',sans-serif;border-bottom:3px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--white)}.tab.active{color:var(--white);border-bottom-color:var(--green)}
.result-row{display:flex;align-items:center;gap:16px;padding:8px 12px;border-radius:4px;cursor:pointer;transition:background .12s}
.result-row:hover{background:var(--hover)}
.result-thumb{width:48px;height:48px;border-radius:4px;flex-shrink:0;overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--dim)}
.result-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.result-info{flex:1;min-width:0}
.r-title{font-size:14px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-meta{font-size:12px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-dur{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);flex-shrink:0}
.source-pill{font-size:9px;font-weight:800;letter-spacing:1px;padding:2px 6px;border-radius:20px;text-transform:uppercase;flex-shrink:0}
.sp-local{background:rgba(29,185,84,.15);color:var(--green)}.sp-offline{background:rgba(29,185,84,.25);color:var(--green)}
.sp-saavn{color:#ffb74d;background:rgba(255,183,77,.1)}.sp-yt{color:#f44336;background:rgba(244,67,54,.1)}

.upload-zone{border:2px dashed #3a3a3a;border-radius:8px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:24px}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--green);background:var(--green-glow)}
.upload-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.upload-zone p{color:var(--muted);font-size:13px}
.upload-zone p span{color:var(--green);font-weight:700}
.upload-zone.uploading{opacity:.5;pointer-events:none}

.pl-header{display:flex;gap:24px;align-items:flex-end;padding:48px 24px 24px;margin:0 -24px 0;min-height:200px}
.pl-cover{width:180px;height:180px;border-radius:4px;background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-size:60px;flex-shrink:0;box-shadow:0 16px 40px rgba(0,0,0,.6)}
.pl-header-info{min-width:0;padding-bottom:4px}
.pl-type{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.pl-title{font-size:44px;font-weight:900;letter-spacing:-2px;color:var(--white);line-height:1;margin-bottom:8px}
.pl-sub{font-size:13px;color:var(--muted)}
.pl-toolbar{display:flex;align-items:center;gap:16px;padding:24px 0 16px}
.big-play-btn{width:56px;height:56px;border-radius:50%;background:var(--green);border:none;color:var(--black);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.big-play-btn:hover{background:var(--green2);transform:scale(1.05)}
.shuffle-btn{background:transparent;border:none;color:var(--muted);font-size:22px;cursor:pointer;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s}
.shuffle-btn:hover{color:var(--white)}.shuffle-btn.active{color:var(--green)}

.queue-item{display:flex;align-items:center;gap:14px;padding:8px 12px;border-radius:4px;cursor:pointer;transition:background .12s}
.queue-item:hover{background:var(--hover)}.queue-item.active{background:rgba(29,185,84,.08)}
.queue-item.active .qi-title{color:var(--green)}
.qi-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);width:28px;text-align:right;flex-shrink:0}
.qi-info{flex:1;min-width:0}
.qi-title{font-size:13px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qi-artist{font-size:11px;color:var(--muted);margin-top:1px}

.lyrics-wrap{max-width:620px;margin:0 auto;text-align:center;padding:24px 0 80px}
.lyric-line{padding:8px 16px;border-radius:8px;font-size:18px;font-weight:700;color:#3a3a3a;transition:all .25s;cursor:default;line-height:1.5;letter-spacing:-.2px}
.lyric-line.active{font-size:26px;color:var(--white)}.lyric-line.near{font-size:21px;color:#777}
.lyric-line.empty-line{height:12px}.lyrics-src{font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px}

.player-bar{height:var(--player-h);display:flex;align-items:center;padding:0 24px;background:#181818;border-top:1px solid #2a2a2a}
.now-playing{display:flex;align-items:center;gap:14px;width:30%;min-width:0}
.np-art{width:56px;height:56px;border-radius:4px;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--dim);overflow:hidden}
.np-art img{width:100%;height:100%;object-fit:cover;display:block}
.np-info{min-width:0}
.np-title{font-size:13px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-artist{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.np-like{background:transparent;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:0 8px;flex-shrink:0}
.np-like:hover{color:var(--white)}

.center-ctrl{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;padding:0 16px}
.ctrl-row{display:flex;align-items:center;gap:8px}
.ctrl-btn{background:transparent;border:none;color:var(--muted);font-size:16px;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ctrl-btn:hover{color:var(--white)}.ctrl-btn.active{color:var(--green)}.ctrl-btn:active{transform:scale(.92)}
.play-btn{width:32px;height:32px;border-radius:50%;background:var(--white);border:none;color:var(--black);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin:0 8px}
.play-btn:hover{transform:scale(1.07)}.play-btn:active{transform:scale(.96)}
.prog-row{display:flex;align-items:center;gap:10px;width:100%;max-width:560px}
.prog-time{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);min-width:36px}
.prog-time.right{text-align:right}
.prog-track{flex:1;height:16px;display:flex;align-items:center;cursor:pointer;position:relative;touch-action:none}
.prog-bg{width:100%;height:4px;background:#535353;border-radius:2px;position:relative;transition:height .15s}
.prog-track:hover .prog-bg{height:6px}
.prog-fill{height:100%;background:var(--white);border-radius:2px;transition:background .15s}
.prog-track:hover .prog-fill{background:var(--green)}
.prog-handle{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:var(--white);opacity:0;pointer-events:none}
.prog-track:hover .prog-handle{opacity:1}
.right-ctrl{width:30%;display:flex;align-items:center;justify-content:flex-end;gap:8px}
.vol-wrap{display:flex;align-items:center;gap:8px;flex:1;max-width:160px}
.vol-track{flex:1;height:16px;display:flex;align-items:center;cursor:pointer;touch-action:none}
.vol-bg{width:100%;height:4px;background:#535353;border-radius:2px;transition:height .15s}
.vol-track:hover .vol-bg{height:6px}
.vol-fill{height:100%;background:var(--white);border-radius:2px;transition:background .15s}
.vol-track:hover .vol-fill{background:var(--green)}

.mobile-player{display:none;flex-direction:column;background:#181818;border-top:1px solid #2a2a2a;position:fixed;bottom:0;left:0;right:0;z-index:15}
.mob-prog{height:3px;background:#535353;cursor:pointer;flex-shrink:0}
.mob-prog-fill{height:100%;background:var(--green)}
.mob-bar{display:flex;align-items:center;gap:12px;padding:8px 16px;height:64px}
.mob-art{width:48px;height:48px;border-radius:4px;flex-shrink:0;overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--dim)}
.mob-art img{width:100%;height:100%;object-fit:cover;display:block}
.mob-info{flex:1;min-width:0}
.mob-title{font-size:14px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mob-artist{font-size:12px;color:var(--muted);margin-top:2px}
.mob-btns{display:flex;align-items:center}
.mob-btn{background:transparent;border:none;color:var(--white);font-size:22px;cursor:pointer;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.mob-play-btn{width:44px;height:44px;border-radius:50%;background:var(--white);border:none;color:var(--black);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:calc(56px + var(--safe-b));background:#121212;border-top:1px solid #2a2a2a;z-index:10;padding-bottom:var(--safe-b)}
.bn-inner{display:flex;height:56px}
.bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;color:var(--muted);font-family:'Figtree',sans-serif;font-size:10px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:color .15s}
.bn-btn.active{color:var(--white)}.bn-icon{font-size:22px;line-height:1}

.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 24px;border-radius:24px;border:none;font-family:'Figtree',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.3px}
.btn-green{background:var(--green);color:var(--black)}.btn-green:hover{background:var(--green2);transform:scale(1.02)}
.btn-outline{background:transparent;color:var(--white);border:1px solid #727272}.btn-outline:hover{border-color:var(--white)}
.btn-danger{background:transparent;color:var(--red)}.btn-sm{padding:6px 16px;font-size:12px}

.empty{text-align:center;padding:60px 30px;color:var(--dim)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.4}
.empty p{font-size:14px;font-weight:600;color:var(--muted)}
.spinner{width:18px;height:18px;border:2.5px solid #535353;border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toasts{position:fixed;bottom:calc(var(--player-h) + 12px);right:20px;display:flex;flex-direction:column;gap:8px;z-index:1000;pointer-events:none}
.toast{background:#282828;border-radius:4px;padding:12px 18px;font-size:13px;font-weight:600;color:var(--white);box-shadow:0 8px 24px rgba(0,0,0,.5);animation:toast-in .2s ease;max-width:300px}
.toast.success{border-left:3px solid var(--green)}.toast.error{border-left:3px solid var(--red)}.toast.info{border-left:3px solid #1e90ff}
@keyframes toast-in{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
.ctx-menu{position:fixed;z-index:9999;background:#282828;border:1px solid #3a3a3a;border-radius:4px;padding:4px;box-shadow:0 16px 48px rgba(0,0,0,.7);min-width:188px}
.ctx-item{padding:10px 16px;border-radius:2px;cursor:pointer;font-size:13px;font-weight:600;color:var(--white);transition:background .1s}
.ctx-item:hover{background:var(--hover)}.ctx-item.danger{color:var(--red)}.ctx-item.accent{color:var(--green)}
.ctx-sep{height:1px;background:#3a3a3a;margin:4px 0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.modal{background:#282828;border-radius:8px;padding:32px;width:100%;max-width:380px;box-shadow:0 32px 80px rgba(0,0,0,.8)}
.modal h3{font-size:22px;font-weight:900;margin-bottom:4px;letter-spacing:-.5px}
.modal p{font-size:13px;color:var(--muted);margin-bottom:20px}
.modal input{width:100%;padding:12px 16px;background:var(--bg3);border:none;border-radius:4px;color:var(--white);font-family:'Figtree',sans-serif;font-size:14px;outline:none}
.modal input:focus{box-shadow:0 0 0 2px var(--green)}
.modal-btns{display:flex;justify-content:flex-end;gap:10px;margin-top:24px}
.perm-modal{background:#121212;border:1px solid #2a2a2a;border-radius:16px;padding:40px;max-width:420px;text-align:center}
.perm-icon{font-size:64px;margin-bottom:16px}
.perm-title{font-size:26px;font-weight:900;letter-spacing:-.5px;margin-bottom:8px}
.perm-desc{font-size:14px;color:var(--muted);margin-bottom:32px;line-height:1.7}
.perm-btn{width:100%;padding:16px;border-radius:8px;background:var(--green);border:none;color:var(--black);font-family:'Figtree',sans-serif;font-size:16px;font-weight:800;cursor:pointer;letter-spacing:.5px;transition:all .15s;margin-bottom:10px}
.perm-btn:hover{background:var(--green2)}
.perm-skip{background:transparent;border:none;color:var(--muted);font-family:'Figtree',sans-serif;font-size:13px;font-weight:600;cursor:pointer;padding:8px}
.perm-skip:hover{color:var(--white)}
.dl-bar{position:fixed;bottom:calc(var(--player-h) + 60px);left:50%;transform:translateX(-50%);background:#282828;border-radius:8px;padding:12px 20px;font-size:13px;font-weight:600;color:var(--white);box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;gap:10px;white-space:nowrap}

@media(max-width:900px){.app{--sidebar-w:200px}}
@media(max-width:700px){
  .app{grid-template-columns:1fr;grid-template-rows:1fr auto}
  .sidebar-wrap{display:none}.main-wrap{grid-column:1;margin:0;border-radius:0}
  .player-wrap{display:none}.mobile-player{display:flex}.bottom-nav{display:block}
  .page{padding:0 16px calc(56px + 76px + 16px)}
  .toasts{bottom:calc(56px + 80px);right:12px}
  .track-row{grid-template-columns:40px 1fr 70px 36px}
  .tr-col-artist,.tr-col-album,.track-table-head span:nth-child(3),.track-table-head span:nth-child(4){display:none}
  .hero-bg{height:180px;min-height:180px}.hero-greeting{font-size:22px}
  .pl-title{font-size:28px}.pl-cover{width:120px;height:120px;font-size:36px}
  .pl-header{padding:24px 16px 16px}.cards-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
  .section-title{font-size:18px}
}
@media(max-width:480px){.cards-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('/static/sw.js',{scope:'/'}).catch(()=>{}));
}

const api={
  get:u=>fetch(u).then(r=>r.json()),
  post:(u,b)=>fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json()),
  put:(u,b)=>fetch(u,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json()),
  del:u=>fetch(u,{method:'DELETE'}).then(r=>r.json()),
  upload:files=>{const fd=new FormData();files.forEach(f=>fd.append('files',f));return fetch('/api/tracks/upload',{method:'POST',body:fd}).then(r=>r.json())}
};
const fmt=s=>{if(!s&&s!==0)return'--:--';const t=Math.floor(s),m=Math.floor(t/60);return`${m}:${String(t%60).padStart(2,'0')}`};

// IndexedDB
const IDB={_db:null,
  open(){if(this._db)return Promise.resolve(this._db);return new Promise((res,rej)=>{const r=indexedDB.open('lily-offline',2);r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('tracks'))db.createObjectStore('tracks',{keyPath:'id'});if(!db.objectStoreNames.contains('settings'))db.createObjectStore('settings',{keyPath:'key'})};r.onsuccess=e=>{this._db=e.target.result;res(this._db)};r.onerror=()=>rej(r.error)})},
  async save(id,blob,meta){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('tracks','readwrite');tx.objectStore('tracks').put({id,blob,meta,savedAt:Date.now()});tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})},
  async get(id){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('tracks','readonly');const r=tx.objectStore('tracks').get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})},
  async del(id){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('tracks','readwrite');tx.objectStore('tracks').delete(id);tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})},
  async all(){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('tracks','readonly');const r=tx.objectStore('tracks').getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})},
  async allKeys(){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('tracks','readonly');const r=tx.objectStore('tracks').getAllKeys();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})},
  async setSetting(key,value){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('settings','readwrite');tx.objectStore('settings').put({key,value});tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})},
  async getSetting(key){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('settings','readonly');const r=tx.objectStore('settings').get(key);r.onsuccess=()=>res(r.result?.value);r.onerror=()=>rej(r.error)})}
};

// Folder Manager
const FolderMgr={_handle:null,
  async requestFolder(){if(!window.showDirectoryPicker)return null;try{const h=await window.showDirectoryPicker({mode:'readwrite',startIn:'music'});this._handle=h;await IDB.setSetting('folderName',h.name);return h}catch(e){if(e.name==='AbortError')return null;throw e}},
  async saveToFolder(filename,blob){if(!this._handle)return false;try{const fh=await this._handle.getFileHandle(filename,{create:true});const w=await fh.createWritable();await w.write(blob);await w.close();return true}catch(e){return false}},
  hasFolder(){return!!this._handle},getFolderName(){return this._handle?.name||null}
};

function getCacheId(track){if(track.source==='local')return`local_${track.id}`;return`${track.source}_${track.source_id||track.id}`}

async function downloadTrackToCache(track,onProgress){
  let streamUrl;
  if(track.source==='local')streamUrl=`/api/stream/${track.id}`;
  else if(track.source==='saavn'){let ru=`/api/resolve/saavn/${encodeURIComponent(track.source_id)}`;if(track.stream_url)ru+=`?stream_url=${encodeURIComponent(track.stream_url)}`;const r=await api.get(ru);streamUrl=r.url;}
  else if(track.source==='youtube'){const r=await api.get(`/api/resolve/youtube/${encodeURIComponent(track.source_id)}`);streamUrl=r.url;}
  if(!streamUrl)throw new Error('No stream URL');
  const resp=await fetch(streamUrl);if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
  const total=parseInt(resp.headers.get('content-length')||'0');
  const reader=resp.body.getReader();const chunks=[];let loaded=0;
  while(true){const{done,value}=await reader.read();if(done)break;chunks.push(value);loaded+=value.length;if(total&&onProgress)onProgress(loaded/total)}
  const blob=new Blob(chunks,{type:'audio/mpeg'});
  const cacheId=getCacheId(track);
  await IDB.save(cacheId,blob,{id:track.id,source_id:track.source_id,source:track.source,title:track.title,artist:track.artist,album:track.album,duration:track.duration,image_url:track.image_url});
  if(FolderMgr.hasFolder()){const safe=(track.title||'track').replace(/[<>:"/\\|?*]/g,'_');await FolderMgr.saveToFolder(`${safe}.mp3`,blob)}
  return cacheId;
}

// Media Session
function setMediaSession(track,artUrl,handlers){
  if(!('mediaSession' in navigator))return;
  try{
    navigator.mediaSession.metadata=new MediaMetadata({title:track.title||'',artist:track.artist||'',album:track.album||'',artwork:artUrl?[{src:artUrl,sizes:'512x512',type:'image/jpeg'}]:[]});
    Object.entries(handlers).forEach(([k,v])=>{try{navigator.mediaSession.setActionHandler(k,v)}catch(e){}});
    navigator.mediaSession.setActionHandler('seekbackward',()=>{const a=document.querySelector('audio._lily');if(a)a.currentTime=Math.max(0,a.currentTime-10)});
    navigator.mediaSession.setActionHandler('seekforward',()=>{const a=document.querySelector('audio._lily');if(a)a.currentTime=Math.min(a.duration||0,a.currentTime+10)});
  }catch(e){}
}
function setMSState(p){try{if('mediaSession' in navigator)navigator.mediaSession.playbackState=p?'playing':'paused'}catch(e){}}
function setMSPos(pos,dur){try{if('mediaSession' in navigator&&dur&&isFinite(dur))navigator.mediaSession.setPositionState({duration:dur,playbackRate:1,position:pos})}catch(e){}}

const useIsOnline=()=>{const[on,setOn]=useState(navigator.onLine);useEffect(()=>{const h=()=>setOn(navigator.onLine);window.addEventListener('online',h);window.addEventListener('offline',h);return()=>{window.removeEventListener('online',h);window.removeEventListener('offline',h)}},[]);return on};

function ArtImg({track,size=40,radius=4}){
  const[src,setSrc]=useState(null);
  useEffect(()=>{if(!track){setSrc(null);return}if(track.source==='local'&&track.id)setSrc(`/api/artwork/${track.id}`);else if(track.image_url)setSrc(track.image_url);else setSrc(null)},[track?.id,track?.image_url]);
  const s={width:size,height:size,borderRadius:radius,flexShrink:0,overflow:'hidden'};
  if(!src)return<div style={{...s,background:'var(--bg3)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dim)',fontSize:size*.38}}>♪</div>;
  return<div style={s}><img src={src} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} onError={()=>setSrc(null)} alt=""/></div>;
}

function Slider({value=0,onSeek,trackClass='prog-track',bgClass='prog-bg',fillClass='prog-fill',handleClass='prog-handle'}){
  const ref=useRef(),drag=useRef(false),dv=useRef(value);
  const[disp,setDisp]=useState(value);
  const calc=e=>{const r=ref.current.getBoundingClientRect();const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;return Math.max(0,Math.min(1,x/r.width))};
  useEffect(()=>{if(!drag.current)setDisp(value)},[value]);
  return<div ref={ref} className={trackClass}
    onMouseDown={e=>{drag.current=true;const v=calc(e);dv.current=v;setDisp(v)}}
    onMouseMove={e=>{if(!drag.current)return;const v=calc(e);dv.current=v;setDisp(v);onSeek(v)}}
    onMouseUp={e=>{if(!drag.current)return;onSeek(dv.current);drag.current=false}}
    onMouseLeave={()=>{drag.current=false}}
    onTouchStart={e=>{e.preventDefault();drag.current=true;const v=calc(e);dv.current=v;setDisp(v)}}
    onTouchMove={e=>{e.preventDefault();if(!drag.current)return;const v=calc(e);dv.current=v;setDisp(v);onSeek(v)}}
    onTouchEnd={e=>{e.preventDefault();drag.current=false}}>
    <div className={bgClass}><div className={fillClass} style={{width:`${disp*100}%`}}/><div className={handleClass} style={{left:`${disp*100}%`}}/></div>
  </div>;
}

const Toasts=({toasts})=><div className="toasts">{toasts.map(t=><div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}</div>;

function CtxMenu({x,y,items,onClose}){
  const ref=useRef();
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))onClose()};document.addEventListener('mousedown',h);document.addEventListener('touchstart',h);return()=>{document.removeEventListener('mousedown',h);document.removeEventListener('touchstart',h)}},[]);
  const mx=Math.min(x,window.innerWidth-200),my=Math.min(y,window.innerHeight-280);
  return<div className="ctx-menu" ref={ref} style={{left:mx,top:my}}>
    {items.map((it,i)=>it===null?<div key={i} className="ctx-sep"/>:<div key={i} className={`ctx-item${it.danger?' danger':''}${it.accent?' accent':''}`} onClick={()=>{it.action();onClose()}}>{it.label}</div>)}
  </div>;
}

function Modal({title,desc,placeholder,defaultValue='',onOk,onClose}){
  const[val,setVal]=useState(defaultValue);const ref=useRef();
  useEffect(()=>{setTimeout(()=>ref.current?.focus(),80)},[]);
  return<div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
    <div className="modal"><h3>{title}</h3>{desc&&<p>{desc}</p>}
      <input ref={ref} value={val} onChange={e=>setVal(e.target.value)} placeholder={placeholder||title} onKeyDown={e=>{if(e.key==='Enter'&&val.trim())onOk(val.trim());if(e.key==='Escape')onClose()}}/>
      <div className="modal-btns"><button className="btn btn-outline btn-sm" onClick={onClose}>Cancel</button><button className="btn btn-green btn-sm" onClick={()=>val.trim()&&onOk(val.trim())}>Save</button></div>
    </div>
  </div>;
}

function FolderPermModal({onGrant,onSkip}){
  return<div className="modal-overlay">
    <div className="perm-modal">
      <div className="perm-icon">📁</div>
      <div className="perm-title">Choose Download Folder</div>
      <div className="perm-desc">Lily will save downloaded songs to a folder on your device so you can listen offline — even without internet. Your music, yours to keep.</div>
      <button className="perm-btn" onClick={onGrant}>📂 Choose Folder</button>
      <button className="perm-skip" onClick={onSkip}>Skip (saves in app only)</button>
    </div>
  </div>;
}

function PlPicker({playlists,onPick,onClose}){
  return<div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
    <div className="modal"><h3>Add to Playlist</h3>
      {playlists.length===0?<p>No playlists yet.</p>:playlists.map(p=>(
        <div key={p.id} style={{padding:'12px 16px',borderRadius:4,cursor:'pointer',marginTop:4,color:'var(--white)',fontWeight:600,fontSize:14,transition:'background .12s'}}
          onMouseOver={e=>e.currentTarget.style.background='var(--hover)'} onMouseOut={e=>e.currentTarget.style.background='transparent'} onClick={()=>onPick(p.id)}>♫ {p.name}</div>
      ))}
      <div className="modal-btns"><button className="btn btn-outline btn-sm" onClick={onClose}>Cancel</button></div>
    </div>
  </div>;
}

function HomePage({onPlay}){
  const[charts,setCharts]=useState([]);const[releases,setReleases]=useState([]);
  const hr=new Date().getHours();const greet=hr<12?'Good morning':hr<18?'Good afternoon':'Good evening';
  useEffect(()=>{api.get('/api/charts').then(setCharts).catch(()=>{});api.get('/api/releases').then(setReleases).catch(()=>{})},[]);
  const Card=({t})=>(
    <div className="track-card" onClick={()=>onPlay(t,[t],0)}>
      {t.image_url?<img src={t.image_url} className="card-art" alt="" onError={e=>e.target.style.display='none'}/>:<div className="card-art-ph">♪</div>}
      <div className="card-title" title={t.title}>{t.title}</div>
      <div className="card-artist">{t.artist}</div>
      <button className="card-play-btn" onClick={e=>{e.stopPropagation();onPlay(t,[t],0)}}>▶</button>
    </div>
  );
  return<div className="page page-fade" style={{paddingTop:0}}>
    <div className="hero-bg" style={{background:'linear-gradient(135deg,#5038a0 0%,#1a3a4a 60%,var(--bg) 100%)'}}>
      <div className="hero-content"><div className="hero-greeting">🌸 {greet}</div><div className="hero-sub">Welcome back to Lily</div></div>
    </div>
    {charts.length>0&&<><div className="section-title">🔥 Trending</div><div className="cards-grid">{charts.slice(0,12).map((t,i)=><Card key={t.source_id||i} t={t}/>)}</div></>}
    {releases.length>0&&<><div className="section-title">✨ New Releases</div><div className="cards-grid">{releases.slice(0,12).map((t,i)=><Card key={t.source_id||i} t={t}/>)}</div></>}
    {!charts.length&&!releases.length&&<div className="empty"><div className="empty-icon">🌸</div><p>Search for music or upload your own files</p></div>}
  </div>;
}

function SearchPage({currentTrack,onPlay,onCtx}){
  const[q,setQ]=useState('');const[tab,setTab]=useState('saavn');
  const[saavnR,setSaavnR]=useState([]);const[ytR,setYtR]=useState([]);
  const[loading,setLoading]=useState({saavn:false,yt:false});const inRef=useRef();
  useEffect(()=>{setTimeout(()=>inRef.current?.focus(),100)},[]);
  const search=async()=>{if(!q.trim())return;setLoading({saavn:true,yt:true});setSaavnR([]);setYtR([]);
    api.get(`/api/search/saavn?q=${encodeURIComponent(q)}`).then(r=>{setSaavnR(r);setLoading(l=>({...l,saavn:false}))}).catch(()=>setLoading(l=>({...l,saavn:false})));
    api.get(`/api/search/youtube?q=${encodeURIComponent(q)}`).then(r=>{setYtR(r);setLoading(l=>({...l,yt:false}))}).catch(()=>setLoading(l=>({...l,yt:false})));
  };
  const results=tab==='saavn'?saavnR:ytR,isLoading=tab==='saavn'?loading.saavn:loading.yt;
  return<div className="page page-fade" style={{display:'flex',flexDirection:'column',paddingTop:0,height:'100%',overflow:'hidden'}}>
    <div style={{padding:'24px 0 20px',flexShrink:0}}>
      <div className="search-bar">
        <span style={{color:'#737373',fontSize:16}}>⌕</span>
        <input ref={inRef} type="search" placeholder="What do you want to play?" value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&search()}/>
        <button className="btn btn-green btn-sm" style={{borderRadius:4}} onClick={search}>Search</button>
      </div>
    </div>
    <div className="tabs">
      <button className={`tab${tab==='saavn'?' active':''}`} onClick={()=>setTab('saavn')}>🎵 JioSaavn{saavnR.length?` (${saavnR.length})`:''}</button>
      <button className={`tab${tab==='youtube'?' active':''}`} onClick={()=>setTab('youtube')}>▶ YouTube{ytR.length?` (${ytR.length})`:''}</button>
    </div>
    <div style={{flex:1,overflowY:'auto'}}>
      {isLoading&&<div style={{textAlign:'center',padding:'60px 0',color:'var(--muted)'}}><div className="spinner" style={{margin:'0 auto 16px'}}/>Searching…</div>}
      {!isLoading&&results.length===0&&q&&<div className="empty"><div className="empty-icon">🔍</div><p>No results for "{q}"</p></div>}
      {results.map((t,i)=>{const active=currentTrack?.source_id===t.source_id;return<div key={t.source_id||i} className="result-row" style={active?{background:'rgba(29,185,84,.08)'}:{}} onClick={()=>onPlay(t,[t],0)} onContextMenu={e=>{e.preventDefault();onCtx(e,t)}}>
        <div className="result-thumb">{t.image_url?<img src={t.image_url} alt="" onError={e=>e.target.style.display='none'}/>:'♪'}</div>
        <div className="result-info"><div className="r-title" style={active?{color:'var(--green)'}:{}}>{t.title}</div><div className="r-meta">{t.artist}{t.album&&t.album!=='YouTube'?` · ${t.album}`:''}</div></div>
        {t.duration>0&&<span className="result-dur">{fmt(t.duration)}</span>}
        <span className={`source-pill ${tab==='saavn'?'sp-saavn':'sp-yt'}`}>{tab==='saavn'?'Saavn':'YT'}</span>
      </div>})}
    </div>
  </div>;
}

function LibraryPage({currentTrack,onPlay,onCtx,toast,offlineKeys}){
  const[tracks,setTracks]=useState([]);const[filter,setFilter]=useState('');const[uploading,setUploading]=useState(false);const[drag,setDrag]=useState(false);const fileRef=useRef();const folderRef=useRef();
  const load=useCallback(()=>{api.get(`/api/tracks${filter?`?search=${encodeURIComponent(filter)}`:''}`).then(setTracks).catch(()=>{})},[filter]);
  useEffect(()=>{load()},[load]);
  const handleFiles=async files=>{if(!files.length)return;setUploading(true);try{const r=await api.upload(Array.from(files));toast(`✓ Added ${r.added} track${r.added!==1?'s':''}`, 'success');load()}catch{toast('Upload failed','error')}finally{setUploading(false)}};
  return<div className="page page-fade" style={{paddingTop:24}}>
    <div style={{marginBottom:24}}><div style={{fontSize:28,fontWeight:900,letterSpacing:'-1px'}}>Your Library</div><div style={{fontSize:13,color:'var(--muted)',marginTop:4}}>{tracks.length} tracks</div></div>
    <div className={`upload-zone${uploading?' uploading':''}${drag?' drag-over':''}`}
      onClick={()=>!uploading&&fileRef.current.click()} onDrop={e=>{e.preventDefault();setDrag(false);handleFiles(e.dataTransfer.files)}}
      onDragOver={e=>{e.preventDefault();setDrag(true)}} onDragLeave={()=>setDrag(false)}>
      <input ref={fileRef} type="file" multiple accept=".mp3,.flac,.ogg,.opus,.m4a,.aac,.wav,.wma" style={{display:'none'}} onChange={e=>handleFiles(e.target.files)}/>
      <input ref={folderRef} type="file" multiple style={{display:'none'}} onChange={e=>handleFiles(e.target.files)} webkitdirectory=""/>
      <div className="upload-icon">{uploading?'⏳':'🎵'}</div>
      {uploading?<p><span>Importing…</span></p>:<p>Drop audio files here or <span>click to browse</span></p>}
      <p style={{fontSize:11,color:'var(--dim)',marginTop:6}}>MP3 · FLAC · OGG · M4A · WAV · OPUS</p>
    </div>
    <div style={{position:'relative',marginBottom:20}}>

function App(){
  const[view,setView]=useState('home');
  const[playlists,setPlaylists]=useState([]);
  const[selectedPl,setSelectedPl]=useState(null);
  const[toasts,setToasts]=useState([]);
  const[ctxMenu,setCtxMenu]=useState(null);
  const[modal,setModal]=useState(null);
  const[plPicker,setPlPicker]=useState(null);
  const[folderName,setFolderName]=useState(null);
  const[showFolderModal,setShowFolderModal]=useState(false);
  const[offlineKeys,setOfflineKeys]=useState([]);
  const[downloading,setDownloading]=useState(null);
  const isOnline=useIsOnline();

  const audioRef=useRef(null);
  if(!audioRef.current){const a=new Audio();a.className='_lily';a.preload='auto';document.body.appendChild(a);audioRef.current=a}

  const[currentTrack,setCurrentTrack]=useState(null);
  const[isPlaying,setIsPlaying]=useState(false);
  const[position,setPosition]=useState(0);
  const[duration,setDuration]=useState(0);
  const[volume,setVolume]=useState(.7);
  const[shuffle,setShuffle]=useState(false);
  const[repeat,setRepeat]=useState(false);
  const[loading,setLoading]=useState(false);
  const[queue,setQueue]=useState([]);
  const[queueIdx,setQueueIdx]=useState(-1);
  const playNextRef=useRef(null);
  const blobUrlRef=useRef(null);

  const refreshOfflineKeys=useCallback(async()=>{try{const k=await IDB.allKeys();setOfflineKeys(k)}catch(e){}},[]);
  useEffect(()=>{refreshOfflineKeys()},[]);
  useEffect(()=>{IDB.getSetting('folderName').then(n=>{if(n)setFolderName(n)}).catch(()=>{})},[]);

  useEffect(()=>{
    const a=audioRef.current;a.volume=volume;
    const onTime=()=>{setPosition(a.currentTime);setMSPos(a.currentTime,a.duration)};
    const onDur=()=>setDuration(a.duration||0);
    const onEnded=()=>{if(playNextRef.current)playNextRef.current()};
    const onPlay=()=>{setIsPlaying(true);setMSState(true)};
    const onPause=()=>{setIsPlaying(false);setMSState(false)};
    a.addEventListener('timeupdate',onTime);a.addEventListener('loadedmetadata',onDur);a.addEventListener('durationchange',onDur);a.addEventListener('ended',onEnded);a.addEventListener('play',onPlay);a.addEventListener('pause',onPause);
    return()=>{a.removeEventListener('timeupdate',onTime);a.removeEventListener('loadedmetadata',onDur);a.removeEventListener('durationchange',onDur);a.removeEventListener('ended',onEnded);a.removeEventListener('play',onPlay);a.removeEventListener('pause',onPause)};
  },[]);
  useEffect(()=>{audioRef.current.volume=volume},[volume]);

  const loadPlaylists=()=>api.get('/api/playlists').then(setPlaylists).catch(()=>{});
  useEffect(()=>{loadPlaylists()},[]);
  const toast=useCallback((msg,type='success')=>{const id=Date.now();setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500)},[]);

  const startTrack=useCallback(async(track,q=null,idx=0)=>{
    setLoading(true);if(q){setQueue(q);setQueueIdx(idx)}
    setCurrentTrack(track);setPosition(0);setDuration(0);
    const a=audioRef.current;
    if(blobUrlRef.current){URL.revokeObjectURL(blobUrlRef.current);blobUrlRef.current=null}
    try{
      let url;
      if(track._offlineUrl){url=track._offlineUrl}
      else{
        const cid=getCacheId(track);
        const cached=await IDB.get(cid).catch(()=>null);
        if(cached){url=URL.createObjectURL(cached.blob);blobUrlRef.current=url}
        else if(!navigator.onLine){toast('Not available offline','error');setLoading(false);return}
        else if(track.source==='local')url=`/api/stream/${track.id}`;
        else if(track.source==='saavn'){let ru=`/api/resolve/saavn/${encodeURIComponent(track.source_id)}`;if(track.stream_url)ru+=`?stream_url=${encodeURIComponent(track.stream_url)}`;const r=await api.get(ru);url=r.url;if(!url)throw new Error('No Saavn URL')}
        else if(track.source==='youtube'){const r=await api.get(`/api/resolve/youtube/${encodeURIComponent(track.source_id)}`);url=r.url;if(!url)throw new Error('No YouTube URL')}
      }
      a.src=url;a.load();await a.play();
      const artUrl=track.source==='local'&&track.id?`/api/artwork/${track.id}`:(track.image_url||null);
      setMediaSession(track,artUrl,{play:()=>a.play(),pause:()=>a.pause(),previoustrack:()=>{if(playNextRef._prev)playNextRef._prev()},nexttrack:()=>{if(playNextRef.current)playNextRef.current()},seekto:d=>{a.currentTime=d.seekTime??a.currentTime}});
    }catch(e){toast(`Playback failed: ${e.message}`,'error');setIsPlaying(false)}
    setLoading(false);
  },[toast]);

  const playNext=useCallback(()=>{
    setRepeat(rpt=>{if(rpt){audioRef.current.currentTime=0;audioRef.current.play().catch(()=>{});return rpt}
      setQueue(q=>{setQueueIdx(i=>{if(!q.length)return i;const next=shuffle?Math.floor(Math.random()*q.length):(i+1)%q.length;startTrack(q[next],q,next);return next});return q});return rpt});
  },[shuffle,startTrack]);
  useEffect(()=>{playNextRef.current=playNext},[playNext]);

  const playPrev=useCallback(()=>{
    if(audioRef.current.currentTime>3){audioRef.current.currentTime=0;return}
    setQueue(q=>{setQueueIdx(i=>{if(!q.length)return i;const p=(i-1+q.length)%q.length;startTrack(q[p],q,p);return p});return q});
  },[startTrack]);
  useEffect(()=>{playNextRef._prev=playPrev},[playPrev]);

  const togglePlay=useCallback(()=>{const a=audioRef.current;if(!a.src&&queue.length){startTrack(queue[Math.max(0,queueIdx)],queue,Math.max(0,queueIdx));return}if(a.paused)a.play().catch(()=>{});else a.pause()},[queue,queueIdx,startTrack]);
  const onPlay=useCallback((track,tracks=null,idx=0)=>{const q=tracks||[track],i=tracks?idx:0;setQueue(q);setQueueIdx(i);startTrack(track,q,i)},[startTrack]);
  const setVol=v=>{setVolume(v);audioRef.current.volume=v};
  const seek=f=>{audioRef.current.currentTime=f*duration;setPosition(f*duration)};

  const _doDownload=useCallback(async track=>{
    setDownloading({title:track.title||'Track',pct:0});
    try{
      await downloadTrackToCache(track,pct=>setDownloading(d=>({...d,pct})));
      toast(`✓ "${track.title}" saved offline`,'success');await refreshOfflineKeys();
    }catch(e){toast(`Download failed: ${e.message}`,'error')}
    setDownloading(null);
  },[toast,refreshOfflineKeys]);

  const handleDownload=useCallback(async track=>{
    const cid=getCacheId(track);
    const ex=await IDB.get(cid).catch(()=>null);
    if(ex){toast('Already downloaded','info');return}
    if(!FolderMgr.hasFolder()&&window.showDirectoryPicker){window._pendingDl=track;setShowFolderModal(true);return}
    _doDownload(track);
  },[toast,_doDownload]);

  const onGrantFolder=useCallback(async()=>{
    setShowFolderModal(false);
    try{const h=await FolderMgr.requestFolder();if(h){setFolderName(h.name);toast(`📁 Downloads folder set: ${h.name}`,'success')}}catch(e){toast('Folder access denied','error')}
    if(window._pendingDl){const t=window._pendingDl;window._pendingDl=null;_doDownload(t)}
  },[toast,_doDownload]);
  const onSkipFolder=useCallback(()=>{setShowFolderModal(false);if(window._pendingDl){const t=window._pendingDl;window._pendingDl=null;_doDownload(t)}},[_doDownload]);

  const showCtx=useCallback((e,track)=>{
    e.preventDefault();
    const cid=getCacheId(track);const isDl=offlineKeys.includes(cid);
    const items=[
      {label:'▶ Play Now',action:()=>onPlay(track)},
      {label:'+ Add to Queue',action:()=>setQueue(q=>{const nq=[...q,track];if(nq.length===1)startTrack(track,nq,0);return nq})},
      null,
      {label:isDl?'✓ Downloaded':'↓ Download for Offline',accent:!isDl,action:()=>handleDownload(track)},
      isDl?{label:'✗ Remove Download',danger:true,action:async()=>{await IDB.del(cid);await refreshOfflineKeys();toast('Removed from downloads')}}:null,
      null,
      {label:'Add to Playlist',action:()=>setPlPicker(track)},
      track.source==='local'?{label:'Delete from Library',danger:true,action:async()=>{await api.del(`/api/tracks/${track.id}`);toast('Deleted','success')}}:null,
    ].filter(Boolean);
    setCtxMenu({x:e.clientX,y:e.clientY,items});
  },[onPlay,offlineKeys,handleDownload,refreshOfflineKeys,toast,startTrack]);

  const createPlaylist=name=>{api.post('/api/playlists',{name}).then(()=>{loadPlaylists();toast(`Playlist created`);setModal(null)})};
  const addToPlaylist=async plId=>{if(!plPicker)return;await api.post(`/api/playlists/${plId}/tracks`,{track_id:plPicker.id});toast('Added to playlist');setPlPicker(null);loadPlaylists()};
  const handleAddFiles=async files=>{if(!files.length)return;try{const r=await api.upload(Array.from(files));toast(`✓ Added ${r.added} track${r.added!==1?'s':''}`,'success')}catch{toast('Upload failed','error')}};
  const nav=v=>{setView(v);setSelectedPl(null)};

  return<div className="app" onClick={()=>setCtxMenu(null)}>
    <Sidebar view={view} onNav={nav} playlists={playlists} selectedPl={selectedPl}
      onPlaylist={p=>{setSelectedPl(p.id);setView('playlist')}} onNewPlaylist={()=>setModal({type:'create'})}
      onAddFiles={handleAddFiles} isOnline={isOnline}/>
    <div className="main-wrap">
      <div className="topbar">
        <div style={{display:'flex',gap:4}}>
          <button className="topbar-nav-btn" onClick={()=>window.history.back()}>‹</button>
          <button className="topbar-nav-btn" onClick={()=>window.history.forward()}>›</button>
        </div>
        <div style={{flex:1}}/>
        {!isOnline&&<span className="offline-badge">OFFLINE MODE</span>}
        <button className={`folder-btn${folderName?' set':''}`} onClick={async()=>{if(!window.showDirectoryPicker){toast('Not supported in this browser','error');return}const h=await FolderMgr.requestFolder();if(h){setFolderName(h.name);toast(`📁 Folder set: ${h.name}`,'success')}}}>
          {folderName?`📂 ${folderName}`:'📁 Set Download Folder'}
        </button>
      </div>
      {view==='home'     &&<HomePage onPlay={onPlay}/>}
      {view==='library'  &&<LibraryPage currentTrack={currentTrack} onPlay={(t,i,ts)=>onPlay(t,ts,i)} onCtx={showCtx} toast={toast} offlineKeys={offlineKeys}/>}
      {view==='search'   &&<SearchPage currentTrack={currentTrack} onPlay={onPlay} onCtx={showCtx}/>}
      {view==='playlist' &&selectedPl&&<PlaylistPage playlist={playlists.find(p=>p.id===selectedPl)} onPlay={(t,ts,i)=>onPlay(t,ts,i)} onCtx={showCtx} onBack={()=>setView('home')} offlineKeys={offlineKeys}/>}
      {view==='queue'    &&<QueuePage queue={queue} queueIdx={queueIdx}
        onPlayIdx={i=>{setQueueIdx(i);startTrack(queue[i],queue,i)}}
        onRemove={i=>{const q=[...queue];q.splice(i,1);setQueue(q);if(queueIdx>=i&&queueIdx>0)setQueueIdx(x=>x-1)}}
        onClear={()=>{setQueue([]);setQueueIdx(-1);audioRef.current.pause();setCurrentTrack(null);setIsPlaying(false)}}/>}
      {view==='lyrics'   &&<LyricsPage currentTrack={currentTrack} position={position}/>}
      {view==='downloads'&&<DownloadsPage onPlay={onPlay} currentTrack={currentTrack}/>}
    </div>
    <div className="player-wrap">
      <PlayerBar track={currentTrack} isPlaying={isPlaying} position={position} duration={duration}
        volume={volume} shuffle={shuffle} repeat={repeat}
        onToggle={togglePlay} onPrev={playPrev} onNext={playNext}
        onSeek={seek} onVolume={setVol} onShuffle={()=>setShuffle(s=>!s)} onRepeat={()=>setRepeat(r=>!r)}
        loading={loading} onQueueClick={()=>nav('queue')} onLyricsClick={()=>nav('lyrics')}/>
    </div>
    <MobilePlayer track={currentTrack} isPlaying={isPlaying} position={position} duration={duration}
      onToggle={togglePlay} onPrev={playPrev} onNext={playNext} onSeek={seek} loading={loading}/>
    <BottomNav view={view} onNav={nav}/>
    <Toasts toasts={toasts}/>
    {ctxMenu&&<CtxMenu x={ctxMenu.x} y={ctxMenu.y} items={ctxMenu.items} onClose={()=>setCtxMenu(null)}/>}
    {modal?.type==='create'&&<Modal title="Create playlist" desc="Give your playlist a name" placeholder="My Playlist" onOk={createPlaylist} onClose={()=>setModal(null)}/>}
    {plPicker&&<PlPicker playlists={playlists} onPick={addToPlaylist} onClose={()=>setPlPicker(null)}/>}
    {showFolderModal&&<FolderPermModal onGrant={onGrantFolder} onSkip={onSkipFolder}/>}
    {downloading&&<div className="dl-bar"><div className="spinner"/>Downloading "{downloading.title}"… {Math.round(downloading.pct*100)}%</div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
