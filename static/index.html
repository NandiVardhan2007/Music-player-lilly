<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Lily Music"/>
<meta name="theme-color" content="#000000"/>
<link rel="manifest" href="/static/manifest.json"/>
<title>Lily Music 🌸</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ── TOKENS ── */
:root{
  --bg:#121212;--bg2:#181818;--bg3:#242424;--bg4:#2a2a2a;
  --hover:#2a2a2a;--sel:#333;--border:#2a2a2a;
  --green:#1DB954;--green2:#1ed760;--green-dim:rgba(29,185,84,.15);
  --white:#fff;--t1:#fff;--t2:#b3b3b3;--dim:#6a6a6a;--black:#000;
  --red:#e91429;
  --player-h:90px;--bnav-h:60px;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);
  --safe-r:env(safe-area-inset-right,0px);
}

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden}
body{height:100%;overflow:hidden;font-family:'Figtree',sans-serif;background:var(--black);color:var(--t1);font-size:14px;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
#root{height:100%;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#535353;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#7a7a7a}

/* ── DESKTOP LAYOUT ── */
.app{display:flex;flex-direction:column;height:100%;overflow:hidden}
.app-body{display:flex;flex:1;overflow:hidden;min-height:0}
.app-player{flex-shrink:0;height:var(--player-h);background:#181818;border-top:1px solid #282828}

/* ── SIDEBAR ── */
.sidebar{width:240px;min-width:240px;background:var(--black);padding:8px;display:flex;flex-direction:column;gap:2px;overflow:hidden}
.sidebar-top{background:var(--bg2);border-radius:8px;flex-shrink:0}
.sidebar-lib{background:var(--bg2);border-radius:8px;flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.s-logo{display:flex;align-items:center;gap:10px;padding:16px 20px 12px;font-size:15px;font-weight:900;letter-spacing:-.3px;color:var(--t1);border-bottom:1px solid transparent}
.s-logo .logo-icon{width:32px;height:32px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.s-nav-btn{display:flex;align-items:center;gap:14px;padding:9px 20px;border:none;background:transparent;color:var(--t2);font-family:'Figtree',sans-serif;font-size:13px;font-weight:700;cursor:pointer;width:100%;text-align:left;transition:color .15s;letter-spacing:.2px}
.s-nav-btn .ico{font-size:20px;width:24px;text-align:center;flex-shrink:0}
.s-nav-btn:hover{color:var(--t1)}.s-nav-btn.act{color:var(--t1)}
.lib-hd{display:flex;align-items:center;padding:14px 16px 6px;gap:8px;flex-shrink:0}
.lib-hd-label{flex:1;font-size:12px;font-weight:700;color:var(--t2);letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.lib-add-btn{background:transparent;border:none;color:var(--t2);cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .15s}
.lib-add-btn:hover{color:var(--t1);background:var(--hover)}
.lib-list{flex:1;overflow-y:auto;padding:4px 8px 8px}
.lib-item{display:flex;align-items:center;gap:12px;padding:7px 8px;border-radius:4px;cursor:pointer;transition:background .12s}
.lib-item:hover{background:var(--hover)}.lib-item.act{background:var(--sel)}
.lib-icon{width:40px;height:40px;border-radius:4px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--bg3);color:var(--t2)}
.lib-icon img{width:100%;height:100%;object-fit:cover;display:block}
.lib-item-info{min-width:0}
.lib-item-name{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lib-item-meta{font-size:11px;color:var(--t2);margin-top:2px}
.sidebar-btns{padding:8px;display:flex;gap:4px;flex-shrink:0}
.s-add-btn{flex:1;background:transparent;border:1px dashed #3a3a3a;border-radius:4px;color:var(--dim);font-family:'Figtree',sans-serif;font-size:11px;font-weight:700;letter-spacing:.3px;padding:7px;cursor:pointer;transition:all .15s;text-align:center}
.s-add-btn:hover{color:var(--t1);border-color:#727272;background:var(--hover)}

/* ── MAIN AREA ── */
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);border-radius:8px;margin:8px 8px 8px 0}
.topbar{display:flex;align-items:center;gap:10px;padding:14px 20px 0;flex-shrink:0}
.topbar-nav{display:flex;gap:4px}
.t-nav-btn{width:32px;height:32px;border-radius:50%;background:#2a2a2a;border:none;color:var(--t1);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.t-nav-btn:hover{background:#3a3a3a}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.offline-pill{padding:4px 10px;border-radius:20px;background:var(--red);color:#fff;font-size:10px;font-weight:800;letter-spacing:.8px}
.folder-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;background:transparent;border:1px solid #555;color:var(--t1);font-family:'Figtree',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis}
.folder-btn:hover{border-color:#fff}.folder-btn.set{border-color:var(--green);color:var(--green)}

/* ── PAGES ── */
.page{flex:1;min-height:0;overflow-y:auto;padding:20px 24px 32px;-webkit-overflow-scrolling:touch}
.page-fade{animation:pfade .25s ease}
@keyframes pfade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Home hero */
.hero{min-height:200px;display:flex;align-items:flex-end;padding:24px;margin:0 -24px 24px;position:relative;overflow:hidden;flex-shrink:0}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(18,18,18,.8) 0%,transparent 60%)}
.hero-content{position:relative;z-index:1}
.hero-greeting{font-size:30px;font-weight:900;letter-spacing:-1px}
.hero-sub{font-size:13px;color:rgba(255,255,255,.65);margin-top:3px}
.section-h{font-size:20px;font-weight:900;letter-spacing:-.5px;margin-bottom:14px;margin-top:4px;display:flex;align-items:center;justify-content:space-between}
.section-h a{font-size:12px;font-weight:700;color:var(--t2);letter-spacing:.5px;cursor:pointer;transition:color .15s}
.section-h a:hover{color:var(--t1)}

/* Cards */
.cards-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px;margin-bottom:28px}
.card{background:var(--bg2);border-radius:8px;padding:14px;cursor:pointer;position:relative;transition:background .2s;overflow:hidden}
.card:hover{background:#282828}.card:hover .card-play{opacity:1;transform:translateY(0)}
.card-art{width:100%;aspect-ratio:1;border-radius:4px;object-fit:cover;display:block;background:var(--bg3);margin-bottom:12px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.card-art-ph{width:100%;aspect-ratio:1;border-radius:4px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:12px;color:var(--dim)}
.card-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.card-sub{font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-play{position:absolute;bottom:66px;right:14px;width:46px;height:46px;border-radius:50%;background:var(--green);border:none;color:var(--black);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(8px);transition:all .2s;box-shadow:0 8px 20px rgba(0,0,0,.4)}
.card-play:hover{background:var(--green2);transform:translateY(0) scale(1.05)!important}

/* Recent strip */
.recent-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:28px}
.recent-item{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border-radius:4px;cursor:pointer;overflow:hidden;transition:background .15s;padding-right:12px}
.recent-item:hover{background:rgba(255,255,255,.12)}
.recent-art{width:52px;height:52px;flex-shrink:0;object-fit:cover;display:block;background:var(--bg3);font-size:22px;display:flex;align-items:center;justify-content:center;color:var(--dim)}
.recent-art img{width:100%;height:100%;object-fit:cover;display:block}
.recent-title{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Track table */
.tbl-head{display:grid;padding:0 14px 0 16px;border-bottom:1px solid #282828;margin-bottom:4px}
.tbl-head-cols{grid-template-columns:36px 1fr 200px 200px 70px 32px}
.tbl-head span{font-size:10px;font-weight:700;color:var(--t2);letter-spacing:1.5px;text-transform:uppercase;padding:8px 0}
.tbl-row{display:grid;padding:3px 14px 3px 16px;border-radius:4px;cursor:pointer;align-items:center;gap:12px;transition:background .1s}
.tbl-row-cols{grid-template-columns:36px 1fr 200px 200px 70px 32px}
.tbl-row:hover{background:var(--hover)}.tbl-row:hover .row-actions{opacity:1}
.tbl-row.playing{background:rgba(29,185,84,.07)}.tbl-row.playing .row-title{color:var(--green)}
.row-num{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--t2);text-align:center;width:36px}
.eq-ani{display:flex;align-items:flex-end;justify-content:center;gap:2px;height:16px}
.eq-b{width:3px;background:var(--green);border-radius:2px;animation:eq .6s ease-in-out infinite alternate}
.eq-b:nth-child(2){animation-delay:.15s;animation-duration:.5s}.eq-b:nth-child(3){animation-delay:.05s;animation-duration:.7s}
@keyframes eq{from{height:4px}to{height:14px}}
.row-info{display:flex;align-items:center;gap:10px;min-width:0}
.row-art{width:40px;height:40px;border-radius:2px;flex-shrink:0;overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--dim)}
.row-art img{width:100%;height:100%;object-fit:cover;display:block}
.row-meta{min-width:0}
.row-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-artist-sm{font-size:11px;color:var(--t2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:none}
.row-text{font-size:13px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-dur{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--t2);text-align:right}
.row-actions{opacity:0;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.row-act-btn{background:transparent;border:none;color:var(--t2);cursor:pointer;font-size:14px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s}
.row-act-btn:hover{color:var(--t1);background:var(--hover)}.row-act-btn.dl{color:var(--green)!important}
.pill{font-size:9px;font-weight:800;letter-spacing:.8px;padding:2px 6px;border-radius:20px;text-transform:uppercase;flex-shrink:0}
.pill-local{background:rgba(29,185,84,.12);color:var(--green)}
.pill-offline{background:rgba(29,185,84,.2);color:var(--green)}
.pill-saavn{background:rgba(255,183,77,.1);color:#ffb74d}
.pill-yt{background:rgba(244,67,54,.1);color:#f44336}

/* Search */
.s-bar-wrap{padding:20px 0 16px;flex-shrink:0}
.s-bar{display:flex;align-items:center;gap:12px;background:#fff;border-radius:24px;padding:11px 18px;max-width:520px}
.s-bar input{flex:1;border:none;outline:none;background:transparent;font-family:'Figtree',sans-serif;font-size:14px;font-weight:600;color:#000}
.s-bar input::placeholder{color:#737373}
.tabs-row{display:flex;border-bottom:1px solid #282828;margin-bottom:18px;flex-shrink:0}
.tab-btn{padding:11px 20px;font-size:13px;font-weight:700;color:var(--t2);cursor:pointer;border:none;background:transparent;font-family:'Figtree',sans-serif;border-bottom:3px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab-btn:hover{color:var(--t1)}.tab-btn.act{color:var(--t1);border-bottom-color:var(--green)}

/* Upload */
.upload-zone{border:2px dashed #3a3a3a;border-radius:8px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:20px;flex-shrink:0}
.upload-zone:hover,.upload-zone.drag{border-color:var(--green);background:var(--green-dim)}
.upload-zone.busy{opacity:.5;pointer-events:none}

/* Playlist header */
.pl-header{display:flex;gap:24px;align-items:flex-end;padding:40px 24px 24px;margin:0 -24px 0;overflow:hidden;position:relative;flex-shrink:0}
.pl-cover{width:180px;height:180px;border-radius:4px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:60px;flex-shrink:0;box-shadow:0 16px 40px rgba(0,0,0,.6)}
.pl-h-info{min-width:0;padding-bottom:4px}
.pl-h-type{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t2);margin-bottom:6px}
.pl-h-name{font-size:44px;font-weight:900;letter-spacing:-2px;line-height:1;margin-bottom:8px}
.pl-h-sub{font-size:13px;color:var(--t2)}
.pl-toolbar{display:flex;align-items:center;gap:14px;padding:20px 0 14px;flex-shrink:0}
.big-play{width:56px;height:56px;border-radius:50%;background:var(--green);border:none;color:var(--black);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.big-play:hover{background:var(--green2);transform:scale(1.05)}
.icon-btn{background:transparent;border:none;font-size:24px;cursor:pointer;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--t2)}
.icon-btn:hover{color:var(--t1)}.icon-btn.act{color:var(--green)}

/* Queue */
.q-item{display:flex;align-items:center;gap:12px;padding:7px 12px;border-radius:4px;cursor:pointer;transition:background .12s}
.q-item:hover{background:var(--hover)}.q-item.act{background:rgba(29,185,84,.07)}.q-item.act .q-title{color:var(--green)}
.q-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--t2);width:26px;text-align:right;flex-shrink:0}
.q-info{flex:1;min-width:0}
.q-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-artist{font-size:11px;color:var(--t2);margin-top:1px}

/* Lyrics */
.lyr-wrap{max-width:600px;margin:0 auto;text-align:center;padding:16px 0 80px}
.lyr-src{font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:24px}
.lyr-line{padding:7px 12px;font-size:17px;font-weight:700;color:#2e2e2e;transition:all .22s;line-height:1.55;letter-spacing:-.1px}
.lyr-line.act{font-size:26px;color:var(--t1)}.lyr-line.near{font-size:20px;color:#777}
.lyr-line.emp{height:10px}

/* ── DESKTOP PLAYER ── */
.player-bar{height:var(--player-h);display:flex;align-items:center;padding:0 20px;gap:0}
.np{display:flex;align-items:center;gap:12px;width:30%;min-width:200px}
.np-art-wrap{width:56px;height:56px;border-radius:4px;flex-shrink:0;overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--dim);cursor:pointer;transition:opacity .15s}
.np-art-wrap:hover{opacity:.8}
.np-art-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.np-info{min-width:0}
.np-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.np-title:hover{text-decoration:underline}
.np-artist{font-size:11px;color:var(--t2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-heart{background:transparent;border:none;color:var(--t2);font-size:16px;cursor:pointer;padding:0 8px;flex-shrink:0;transition:color .15s}
.np-heart:hover{color:var(--t1)}
.ctrl-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;padding:0 14px;min-width:0}
.ctrl-row{display:flex;align-items:center;gap:6px}
.ctrl-btn{background:transparent;border:none;color:var(--t2);font-size:16px;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.ctrl-btn:hover{color:var(--t1)}.ctrl-btn.act{color:var(--green)}.ctrl-btn:active{transform:scale(.9)}
.play-btn{width:32px;height:32px;border-radius:50%;background:var(--t1);border:none;color:var(--black);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin:0 6px;flex-shrink:0}
.play-btn:hover{transform:scale(1.07)}.play-btn:active{transform:scale(.94)}
.prog-row{display:flex;align-items:center;gap:8px;width:100%;max-width:520px}
.prog-t{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t2);min-width:34px;flex-shrink:0}
.prog-t.r{text-align:right}
.prog-track{flex:1;height:16px;display:flex;align-items:center;cursor:pointer;position:relative;touch-action:none}
.prog-bg{width:100%;height:4px;background:#535353;border-radius:2px;transition:height .15s}
.prog-track:hover .prog-bg{height:6px}
.prog-fill{height:100%;background:var(--t1);border-radius:2px;transition:background .15s;pointer-events:none}
.prog-track:hover .prog-fill{background:var(--green)}
.prog-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:var(--t1);opacity:0;pointer-events:none}
.prog-track:hover .prog-dot{opacity:1}
.right-ctrl{width:30%;display:flex;align-items:center;justify-content:flex-end;gap:6px;min-width:180px}
.vol-row{display:flex;align-items:center;gap:6px;flex:1;max-width:150px}
.vol-ico{font-size:14px;color:var(--t2);flex-shrink:0;cursor:pointer}
.vol-track{flex:1;height:16px;display:flex;align-items:center;cursor:pointer;touch-action:none}
.vol-bg{width:100%;height:4px;background:#535353;border-radius:2px;transition:height .15s}
.vol-track:hover .vol-bg{height:6px}
.vol-fill{height:100%;background:var(--t1);border-radius:2px;transition:background .15s}
.vol-track:hover .vol-fill{background:var(--green)}

/* Sleep timer badge */
.sleep-badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:12px;background:rgba(29,185,84,.2);color:var(--green);letter-spacing:.5px;font-family:'JetBrains Mono',monospace;flex-shrink:0}

/* ── MOBILE PLAYER ── */
.mob-player{display:none;flex-direction:column;background:#181818;border-top:1px solid #282828;position:fixed;bottom:0;left:0;right:0;z-index:20;padding-bottom:var(--safe-b)}
.mob-prog{height:3px;background:#535353;cursor:pointer;touch-action:none;flex-shrink:0}
.mob-prog-fill{height:100%;background:var(--green);pointer-events:none}
.mob-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;height:62px;cursor:pointer}
.mob-art{width:46px;height:46px;border-radius:4px;flex-shrink:0;overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--dim)}
.mob-art img{width:100%;height:100%;object-fit:cover;display:block}
.mob-info{flex:1;min-width:0}
.mob-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mob-artist{font-size:11px;color:var(--t2);margin-top:1px}
.mob-btns{display:flex;align-items:center;gap:0;flex-shrink:0}
.mob-ctrl{background:transparent;border:none;color:var(--t1);font-size:22px;cursor:pointer;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.mob-play{width:42px;height:42px;border-radius:50%;background:var(--t1);border:none;color:var(--black);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── EXPANDED MOBILE PLAYER ── */
.exp-player{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;overflow:hidden;padding:var(--safe-t) var(--safe-l) var(--safe-b) var(--safe-r);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.exp-player.closed{transform:translateY(100%);pointer-events:none}
.exp-player.open{transform:translateY(0)}
.exp-bg{position:absolute;inset:0;z-index:-1}
.exp-bg-blur{position:absolute;inset:0;backdrop-filter:blur(60px);-webkit-backdrop-filter:blur(60px);background:rgba(0,0,0,.7)}
.exp-header{display:flex;align-items:center;padding:16px 20px 8px;flex-shrink:0}
.exp-down-btn{background:transparent;border:none;color:var(--t2);font-size:26px;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0}
.exp-down-btn:hover{background:rgba(255,255,255,.1)}
.exp-title-area{flex:1;text-align:center}
.exp-context{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:.5px;text-transform:uppercase}
.exp-pl-name{font-size:12px;color:var(--t2);margin-top:2px}
.exp-more-btn{background:transparent;border:none;color:var(--t2);font-size:20px;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.exp-art-wrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:12px 40px}
.exp-art{width:min(72vw,360px);height:min(72vw,360px);border-radius:8px;box-shadow:0 24px 60px rgba(0,0,0,.7);overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:80px;color:var(--dim)}
.exp-art img{width:100%;height:100%;object-fit:cover;display:block}
.exp-info{padding:0 28px 8px;flex-shrink:0}
.exp-track-title{font-size:22px;font-weight:900;letter-spacing:-.5px;line-height:1.2;margin-bottom:4px}
.exp-track-artist{font-size:14px;color:var(--t2)}
.exp-prog{padding:0 24px;flex-shrink:0}
.exp-prog-track{width:100%;height:20px;display:flex;align-items:center;cursor:pointer;touch-action:none}
.exp-prog-bg{width:100%;height:4px;background:#535353;border-radius:2px}
.exp-prog-fill{height:100%;background:var(--t1);border-radius:2px}
.exp-prog-times{display:flex;justify-content:space-between;padding:0 2px;margin-top:4px}
.exp-prog-times span{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t2)}
.exp-ctrl{display:flex;align-items:center;justify-content:center;gap:4px;padding:12px 24px;flex-shrink:0}
.exp-btn{background:transparent;border:none;color:var(--t2);font-size:26px;cursor:pointer;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s}
.exp-btn:hover{color:var(--t1)}.exp-btn.act{color:var(--green)}
.exp-play{width:68px;height:68px;border-radius:50%;background:var(--t1);border:none;color:var(--black);font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin:0 8px}
.exp-play:hover{transform:scale(1.05)}
.exp-extra{display:flex;justify-content:space-between;align-items:center;padding:0 28px 16px;flex-shrink:0}
.exp-extra-btn{background:transparent;border:none;color:var(--t2);font-size:20px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s}
.exp-extra-btn span{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.exp-extra-btn:hover{color:var(--t1)}.exp-extra-btn.act{color:var(--green)}

/* ── BOTTOM NAV ── */
.bnav{display:none;flex-shrink:0;background:#121212;border-top:1px solid #282828;padding-bottom:var(--safe-b)}
.bnav-inner{display:flex;height:var(--bnav-h)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;color:var(--t2);font-family:'Figtree',sans-serif;font-size:10px;font-weight:700;letter-spacing:.4px;cursor:pointer;transition:color .15s}
.bnav-btn .bi{font-size:22px;line-height:1}
.bnav-btn.act{color:var(--t1)}

/* ── MODALS / OVERLAYS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
.modal{background:#282828;border-radius:8px;padding:28px;width:100%;max-width:380px;box-shadow:0 32px 80px rgba(0,0,0,.8)}
.modal h3{font-size:20px;font-weight:900;margin-bottom:4px;letter-spacing:-.4px}
.modal p{font-size:13px;color:var(--t2);margin-bottom:18px}
.modal-input{width:100%;padding:11px 14px;background:var(--bg3);border:none;border-radius:4px;color:var(--t1);font-family:'Figtree',sans-serif;font-size:14px;outline:none;margin-bottom:4px}
.modal-input:focus{box-shadow:0 0 0 2px var(--green)}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}

.folder-modal{background:#111;border:1px solid #2a2a2a;border-radius:16px;padding:36px;max-width:400px;text-align:center}
.folder-modal .fi{font-size:60px;margin-bottom:14px}
.folder-modal h3{font-size:24px;font-weight:900;letter-spacing:-.4px;margin-bottom:8px}
.folder-modal p{font-size:13px;color:var(--t2);margin-bottom:28px;line-height:1.65}
.folder-modal-btn{width:100%;padding:15px;border-radius:8px;background:var(--green);border:none;color:var(--black);font-family:'Figtree',sans-serif;font-size:15px;font-weight:800;cursor:pointer;margin-bottom:10px;transition:all .15s}
.folder-modal-btn:hover{background:var(--green2)}
.folder-modal-skip{background:transparent;border:none;color:var(--t2);font-family:'Figtree',sans-serif;font-size:12px;font-weight:700;cursor:pointer;padding:6px;transition:color .15s}
.folder-modal-skip:hover{color:var(--t1)}

/* Sleep timer modal */
.sleep-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.sleep-opt{padding:12px;border-radius:6px;border:1px solid #3a3a3a;background:transparent;color:var(--t1);font-family:'Figtree',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center}
.sleep-opt:hover{border-color:var(--green);color:var(--green)}
.sleep-opt.act{background:var(--green-dim);border-color:var(--green);color:var(--green)}

/* Context menu */
.ctx{position:fixed;z-index:9999;background:#282828;border:1px solid #3a3a3a;border-radius:6px;padding:4px;box-shadow:0 16px 48px rgba(0,0,0,.7);min-width:190px}
.ctx-item{padding:9px 14px;border-radius:3px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t1);transition:background .1s;display:flex;align-items:center;gap:10px}
.ctx-item:hover{background:var(--hover)}.ctx-item.danger{color:var(--red)}.ctx-item.accent{color:var(--green)}
.ctx-sep{height:1px;background:#3a3a3a;margin:3px 0}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 22px;border-radius:24px;border:none;font-family:'Figtree',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.2px}
.btn-g{background:var(--green);color:var(--black)}.btn-g:hover{background:var(--green2);transform:scale(1.02)}
.btn-o{background:transparent;color:var(--t1);border:1px solid #727272}.btn-o:hover{border-color:var(--t1)}
.btn-danger{background:transparent;color:var(--red)}.btn-sm{padding:6px 16px;font-size:12px}

/* Toast */
.toasts{position:fixed;bottom:calc(var(--player-h) + 14px);right:18px;display:flex;flex-direction:column;gap:7px;z-index:1000;pointer-events:none}
.toast{background:#282828;border-radius:4px;padding:11px 16px;font-size:13px;font-weight:600;color:var(--t1);box-shadow:0 8px 24px rgba(0,0,0,.5);animation:tin .18s ease;max-width:290px}
.toast.success{border-left:3px solid var(--green)}.toast.error{border-left:3px solid var(--red)}.toast.info{border-left:3px solid #1e90ff}
@keyframes tin{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}

/* DL Progress */
.dl-progress{position:fixed;bottom:calc(var(--player-h) + 58px);left:50%;transform:translateX(-50%);background:#282828;border-radius:6px;padding:10px 18px;font-size:12px;font-weight:700;color:var(--t1);box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;gap:10px;white-space:nowrap}
.dl-progress-bar{position:fixed;bottom:calc(var(--player-h) + 58px);left:50%;transform:translateX(-50%);width:260px;height:3px;background:#3a3a3a;border-radius:2px;z-index:998}
.dl-progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .1s}

/* Empty state */
.empty{text-align:center;padding:56px 24px;color:var(--dim)}
.empty-icon{font-size:44px;margin-bottom:14px;opacity:.35}
.empty p{font-size:13px;font-weight:600;color:var(--t2);max-width:260px;margin:0 auto}

.spinner{width:18px;height:18px;border:2.5px solid #535353;border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RESPONSIVE ── */
@media(min-width:1200px){
  .sidebar{width:260px;min-width:260px}
}
@media(max-width:1000px){
  .sidebar{width:200px;min-width:200px}
  .tbl-head-cols,.tbl-row-cols{grid-template-columns:36px 1fr 160px 70px 32px}
  .col-album{display:none}
}
@media(max-width:800px){
  .sidebar{width:180px;min-width:180px}
  .tbl-head-cols,.tbl-row-cols{grid-template-columns:36px 1fr 70px 32px}
  .col-album,.col-artist{display:none}
  .row-artist-sm{display:block}
  .cards-row{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
}
@media(max-width:700px){
  .sidebar{display:none}
  .main{margin:0;border-radius:0}
  .app-player{display:none}
  .mob-player{display:flex}
  .bnav{display:flex;flex-direction:column}
  .page{padding:14px 14px calc(var(--bnav-h) + var(--safe-b) + 78px)}
  .topbar{padding:10px 14px 0}
  .hero{margin:0 -14px 18px;min-height:160px}
  .hero-greeting{font-size:22px}
  .cards-row{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
  .section-h{font-size:16px}
  .tbl-head{display:none}
  .tbl-head-cols,.tbl-row-cols{grid-template-columns:36px 1fr 70px 32px}
  .col-album,.col-artist{display:none}
  .row-artist-sm{display:block}
  .pl-header{padding:24px 14px 16px;margin:0 -14px 0}
  .pl-cover{width:110px;height:110px;font-size:40px}
  .pl-h-name{font-size:26px}
  .folder-btn{max-width:110px;font-size:10px;padding:5px 10px}
  .toasts{bottom:calc(var(--bnav-h) + var(--safe-b) + 72px);right:10px}
  .dl-progress{bottom:calc(var(--bnav-h) + var(--safe-b) + 72px)}
  .dl-progress-bar{bottom:calc(var(--bnav-h) + var(--safe-b) + 68px)}
  .recent-strip{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:480px){
  .cards-row{grid-template-columns:repeat(2,1fr)}
  .recent-strip{grid-template-columns:1fr 1fr}
}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ── Service Worker ────────────────────────────────────────────────────────────
if('serviceWorker' in navigator)
  window.addEventListener('load',()=>navigator.serviceWorker.register('/static/sw.js',{scope:'/'}).catch(()=>{}));

// ── API ───────────────────────────────────────────────────────────────────────
const api={
  get:u=>fetch(u).then(r=>{if(!r.ok)throw new Error(`${r.status}`);return r.json()}),
  post:(u,b)=>fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json()),
  put:(u,b)=>fetch(u,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json()),
  del:u=>fetch(u,{method:'DELETE'}).then(r=>r.json()),
  upload:files=>{const fd=new FormData();files.forEach(f=>fd.append('files',f));return fetch('/api/tracks/upload',{method:'POST',body:fd}).then(r=>r.json())}
};
const fmt=s=>{if(!s&&s!==0)return'--:--';const t=Math.floor(s),m=Math.floor(t/60);return`${m}:${String(t%60).padStart(2,'0')}`};

// ── IndexedDB ─────────────────────────────────────────────────────────────────
const IDB={_db:null,
  open(){if(this._db)return Promise.resolve(this._db);return new Promise((res,rej)=>{const r=indexedDB.open('lily-v3',1);r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('tracks'))db.createObjectStore('tracks',{keyPath:'id'});if(!db.objectStoreNames.contains('settings'))db.createObjectStore('settings',{keyPath:'key'})};r.onsuccess=e=>{this._db=e.target.result;res(this._db)};r.onerror=()=>rej(r.error)})},
  async save(id,blob,meta){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('tracks','readwrite');tx.objectStore('tracks').put({id,blob,meta,savedAt:Date.now()});tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})},
  async get(id){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('tracks','readonly');const r=tx.objectStore('tracks').get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})},
  async del(id){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('tracks','readwrite');tx.objectStore('tracks').delete(id);tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})},
  async all(){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('tracks','readonly');const r=tx.objectStore('tracks').getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})},
  async allKeys(){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('tracks','readonly');const r=tx.objectStore('tracks').getAllKeys();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})},
  async setSetting(key,value){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('settings','readwrite');tx.objectStore('settings').put({key,value});tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})},
  async getSetting(key){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('settings','readonly');const r=tx.objectStore('settings').get(key);r.onsuccess=()=>res(r.result?.value);r.onerror=()=>rej(r.error)})}
};

// ── Folder Manager ────────────────────────────────────────────────────────────
const FolderMgr={_h:null,
  async request(){if(!window.showDirectoryPicker)return null;try{const h=await window.showDirectoryPicker({mode:'readwrite',startIn:'music'});this._h=h;await IDB.setSetting('folderName',h.name);return h}catch(e){if(e.name==='AbortError')return null;throw e}},
  async save(name,blob){if(!this._h)return false;try{const fh=await this._h.getFileHandle(name,{create:true});const w=await fh.createWritable();await w.write(blob);await w.close();return true}catch{return false}},
  has(){return!!this._h},name(){return this._h?.name||null}
};

function cacheId(track){return track.source==='local'?`local_${track.id}`:`${track.source}_${track.source_id||track.id}`}

// ── Download ──────────────────────────────────────────────────────────────────
async function downloadTrack(track,onProgress){
  let url;
  if(track.source==='local')url=`/api/stream/${track.id}`;
  else if(track.source==='saavn'){let ru=`/api/resolve/saavn/${encodeURIComponent(track.source_id)}`;if(track.stream_url)ru+=`?stream_url=${encodeURIComponent(track.stream_url)}`;url=(await api.get(ru)).url}
  else if(track.source==='youtube')url=(await api.get(`/api/resolve/youtube/${encodeURIComponent(track.source_id)}`)).url;
  if(!url)throw new Error('No stream URL');
  const resp=await fetch(url);if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
  const total=parseInt(resp.headers.get('content-length')||'0');
  const reader=resp.body.getReader();const chunks=[];let loaded=0;
  while(true){const{done,value}=await reader.read();if(done)break;chunks.push(value);loaded+=value.length;if(total&&onProgress)onProgress(loaded/total)}
  const blob=new Blob(chunks,{type:'audio/mpeg'});
  const cid=cacheId(track);
  await IDB.save(cid,blob,{id:track.id,source_id:track.source_id,source:track.source,title:track.title,artist:track.artist,album:track.album,duration:track.duration,image_url:track.image_url});
  if(FolderMgr.has()){const safe=(track.title||'track').replace(/[<>:"/\\|?*]/g,'_');await FolderMgr.save(`${safe}.mp3`,blob)}
  return cid;
}

// ── Media Session ─────────────────────────────────────────────────────────────
function setMS(track,artUrl,h){
  if(!('mediaSession' in navigator))return;
  try{
    navigator.mediaSession.metadata=new MediaMetadata({title:track.title||'',artist:track.artist||'',album:track.album||'',artwork:artUrl?[{src:artUrl,sizes:'512x512',type:'image/jpeg'}]:[]});
    const keys={play:'play',pause:'pause',previoustrack:'prev',nexttrack:'next',seekto:'seekto'};
    Object.entries(keys).forEach(([k,v])=>{ try{navigator.mediaSession.setActionHandler(k,h[v]||null)}catch(e){} });
    try{navigator.mediaSession.setActionHandler('seekbackward',()=>{const a=document.querySelector('audio._lily');if(a)a.currentTime=Math.max(0,a.currentTime-10)})}catch(e){}
    try{navigator.mediaSession.setActionHandler('seekforward',()=>{const a=document.querySelector('audio._lily');if(a)a.currentTime=Math.min(a.duration||0,a.currentTime+10)})}catch(e){}
  }catch(e){}
}
function setMSState(p){try{if('mediaSession' in navigator)navigator.mediaSession.playbackState=p?'playing':'paused'}catch(e){}}
function setMSPos(pos,dur){try{if('mediaSession' in navigator&&dur&&isFinite(dur))navigator.mediaSession.setPositionState({duration:dur,playbackRate:1,position:pos})}catch(e){}}

// ── Hooks ─────────────────────────────────────────────────────────────────────
const useOnline=()=>{const[on,set]=useState(navigator.onLine);useEffect(()=>{const u=()=>set(navigator.onLine);window.addEventListener('online',u);window.addEventListener('offline',u);return()=>{window.removeEventListener('online',u);window.removeEventListener('offline',u)}},[]);return on};
const useMobile=()=>{const[m,set]=useState(window.innerWidth<=700);useEffect(()=>{const u=()=>set(window.innerWidth<=700);window.addEventListener('resize',u);return()=>window.removeEventListener('resize',u)},[]);return m};

// ── ArtImg ────────────────────────────────────────────────────────────────────
function ArtImg({track,size=40,radius=4,style={}}){
  const[src,setSrc]=useState(null);
  useEffect(()=>{if(!track)return setSrc(null);if(track.source==='local'&&track.id)setSrc(`/api/artwork/${track.id}`);else if(track.image_url)setSrc(track.image_url);else setSrc(null)},[track?.id,track?.image_url,track?.source]);
  const base={width:size,height:size,borderRadius:radius,flexShrink:0,overflow:'hidden',...style};
  if(!src)return<div style={{...base,background:'var(--bg3)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dim)',fontSize:size*.35}}>♪</div>;
  return<div style={base}><img src={src} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} onError={()=>setSrc(null)} alt=""/></div>;
}

// ── Slider ────────────────────────────────────────────────────────────────────
function Slider({value=0,onSeek,trackCls,bgCls,fillCls,dotCls,style={}}){
  const ref=useRef(),drag=useRef(false),dv=useRef(value);
  const[disp,setDisp]=useState(value);
  const calc=e=>{const r=ref.current.getBoundingClientRect();const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;return Math.max(0,Math.min(1,x/r.width))};
  useEffect(()=>{if(!drag.current)setDisp(value)},[value]);
  return<div ref={ref} className={trackCls} style={style}
    onMouseDown={e=>{drag.current=true;const v=calc(e);dv.current=v;setDisp(v)}}
    onMouseMove={e=>{if(!drag.current)return;const v=calc(e);dv.current=v;setDisp(v);onSeek(v,false)}}
    onMouseUp={e=>{if(!drag.current)return;onSeek(dv.current,true);drag.current=false}}
    onMouseLeave={()=>{if(drag.current){onSeek(dv.current,true);drag.current=false}}}
    onTouchStart={e=>{e.preventDefault();drag.current=true;const v=calc(e);dv.current=v;setDisp(v)}}
    onTouchMove={e=>{e.preventDefault();if(!drag.current)return;const v=calc(e);dv.current=v;setDisp(v);onSeek(v,false)}}
    onTouchEnd={e=>{e.preventDefault();onSeek(dv.current,true);drag.current=false}}>
    <div className={bgCls}><div className={fillCls} style={{width:`${disp*100}%`}}/>{dotCls&&<div className={dotCls} style={{left:`${disp*100}%`}}/>}</div>
  </div>;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
const Toasts=({items})=><div className="toasts">{items.map(t=><div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}</div>;

// ── Context Menu ──────────────────────────────────────────────────────────────
function CtxMenu({x,y,items,onClose}){
  const ref=useRef();
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))onClose()};document.addEventListener('mousedown',h);document.addEventListener('touchstart',h);return()=>{document.removeEventListener('mousedown',h);document.removeEventListener('touchstart',h)}},[]);
  const lx=Math.min(x,window.innerWidth-200),ly=Math.min(y,window.innerHeight-300);
  return<div className="ctx" ref={ref} style={{left:lx,top:ly}}>

  return<div className="sidebar">
    <div className="sidebar-top">
      <div className="s-logo">
        <div className="logo-icon">🌸</div>
        Lily Music
        {!isOnline&&<span style={{marginLeft:'auto',fontSize:9,fontWeight:800,padding:'2px 7px',borderRadius:10,background:'var(--red)',color:'#fff',letterSpacing:.8}}>OFFLINE</span>}
      </div>
      {[['home','⌂','Home'],['search','⌕','Search'],['downloads','↓','Downloads']].map(([v,ico,lbl])=>(
        <button key={v} className={`s-nav-btn${view===v?' act':''}`} onClick={()=>onNav(v)}><span className="ico">{ico}</span>{lbl}</button>
      ))}
    </div>
    <div className="sidebar-lib">
      <div className="lib-hd">
        <div className="lib-hd-label"><span style={{fontSize:16}}>♫</span> Your Library</div>
        <button className="lib-add-btn" onClick={onNewPlaylist} title="New Playlist">+</button>
      </div>
      <div className="lib-list">
        <div className="lib-item" onClick={()=>onNav('library')}>
          <div className="lib-icon" style={{background:'linear-gradient(135deg,#450af5,#c4efd9)'}}>♪</div>
          <div className="lib-item-info"><div className="lib-item-name">Library</div><div className="lib-item-meta">All tracks</div></div>
        </div>
        {playlists.map(p=>(
          <div key={p.id} className={`lib-item${selectedPl===p.id?' act':''}`} onClick={()=>onPlaylist(p)}>
            <div className="lib-icon" style={{background:'linear-gradient(135deg,#1a3050,#2a5080)'}}>♫</div>
            <div className="lib-item-info"><div className="lib-item-name">{p.name}</div><div className="lib-item-meta">Playlist · {p.track_count||0}</div></div>
          </div>
        ))}
      </div>
      <div className="sidebar-btns">
        <input ref={fRef} type="file" multiple accept=".mp3,.flac,.ogg,.opus,.m4a,.aac,.wav,.wma" style={{display:'none'}} onChange={e=>onAddFiles(e.target.files)}/>
        <input ref={dRef} type="file" multiple style={{display:'none'}} onChange={e=>onAddFiles(e.target.files)} webkitdirectory=""/>
        <button className="s-add-btn" onClick={()=>fRef.current.click()}>+ Files</button>
        <button className="s-add-btn" onClick={()=>dRef.current.click()}>+ Folder</button>
      </div>
    </div>
  </div>;
}

// ── Bottom Nav ────────────────────────────────────────────────────────────────
const BottomNav=({view,onNav})=><div className="bnav">
  <div className="bnav-inner">
    {[['home','⌂','Home'],['search','⌕','Search'],['library','♪','Library'],['downloads','↓','Saved'],['lyrics','✦','Lyrics']].map(([v,ico,lbl])=>(
      <button key={v} className={`bnav-btn${view===v?' act':''}`} onClick={()=>onNav(v)}>
        <span className="bi">{ico}</span>{lbl}
      </button>
    ))}
  </div>
</div>;

// ── Desktop Player ────────────────────────────────────────────────────────────
function PlayerBar({track,isPlaying,pos,dur,vol,shuffle,repeat,sleepMins,onToggle,onPrev,onNext,onSeek,onVol,onShuffle,onRepeat,loading,onQueue,onLyrics,onSleep,onExpand}){
  const pct=dur>0?pos/dur:0;
  return<div className="player-bar">
    <div className="np">
      <div className="np-art-wrap" onClick={onExpand}><ArtImg track={track} size={56} radius={4}/></div>
      {track&&<><div className="np-info">
        <div className="np-title" onClick={onLyrics}>{track.title||'Unknown'}</div>
        <div className="np-artist">{track.artist||''}</div>
      </div><button className="np-heart">♡</button></>}
    </div>
    <div className="ctrl-center">
      <div className="ctrl-row">
        <button className={`ctrl-btn${shuffle?' act':''}`} onClick={onShuffle} style={{fontSize:14}}>⇌</button>
        <button className="ctrl-btn" onClick={onPrev} style={{fontSize:20}}>⏮</button>
        <button className="play-btn" onClick={onToggle} disabled={loading}>
          {loading?<div className="spinner" style={{width:14,height:14}}/>:(isPlaying?<span style={{fontSize:11}}>⏸</span>:<span style={{marginLeft:2,fontSize:12}}>▶</span>)}
        </button>
        <button className="ctrl-btn" onClick={onNext} style={{fontSize:20}}>⏭</button>
        <button className={`ctrl-btn${repeat?' act':''}`} onClick={onRepeat} style={{fontSize:14}}>↻</button>
      </div>
      <div className="prog-row">
        <span className="prog-t">{fmt(pos)}</span>
        <Slider value={pct} onSeek={(f,commit)=>onSeek(f,commit)} trackCls="prog-track" bgCls="prog-bg" fillCls="prog-fill" dotCls="prog-dot"/>
        <span className="prog-t r">{fmt(dur)}</span>
      </div>
    </div>
    <div className="right-ctrl">
      {sleepMins&&<span className="sleep-badge">{sleepMins}m</span>}
      <button className="ctrl-btn" onClick={onSleep} title="Sleep Timer" style={{fontSize:14}}>⏱</button>
      <button className="ctrl-btn" onClick={onLyrics} style={{fontSize:13}}>✦</button>
      <button className="ctrl-btn" onClick={onQueue} style={{fontSize:15}}>≡</button>
      <div className="vol-row">
        <span className="vol-ico">🔊</span>
        <Slider value={vol} onSeek={(f)=>onVol(f)} trackCls="vol-track" bgCls="vol-bg" fillCls="vol-fill"/>
      </div>
    </div>
  </div>;
}

// ── Mobile Player ─────────────────────────────────────────────────────────────
function MobilePlayer({track,isPlaying,pos,dur,onToggle,onPrev,onNext,onSeek,loading,onExpand}){
  const pct=dur>0?pos/dur:0;
  if(!track)return<div className="mob-player" style={{height:3}}><div className="mob-prog"><div className="mob-prog-fill" style={{width:'0%'}}/></div></div>;
  const handleProg=e=>{const r=e.currentTarget.getBoundingClientRect();onSeek(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)),true)};
  return<div className="mob-player">
    <div className="mob-prog" onClick={handleProg}><div className="mob-prog-fill" style={{width:`${pct*100}%`}}/></div>
    <div className="mob-bar" onClick={onExpand}>
      <div className="mob-art"><ArtImg track={track} size={46} radius={4}/></div>
      <div className="mob-info"><div className="mob-title">{track.title}</div><div className="mob-artist">{track.artist}</div></div>
      <div className="mob-btns" onClick={e=>e.stopPropagation()}>
        <button className="mob-ctrl" onClick={onPrev}>⏮</button>
        <button className="mob-play" onClick={onToggle} disabled={loading}>{loading?<div className="spinner" style={{width:16,height:16}}/>:(isPlaying?'⏸':'▶')}</button>
        <button className="mob-ctrl" onClick={onNext}>⏭</button>
      </div>
    </div>
  </div>;
}

// ── Expanded Player (mobile full-screen) ──────────────────────────────────────
function ExpandedPlayer({track,isPlaying,pos,dur,vol,shuffle,repeat,loading,sleepMins,onClose,onToggle,onPrev,onNext,onSeek,onVol,onShuffle,onRepeat,onSleep,onDownload,onShare,onLyrics,isDownloaded}){
  const pct=dur>0?pos/dur:0;
  const artUrl=track?.source==='local'&&track?.id?`/api/artwork/${track.id}`:(track?.image_url||null);
  const bg=artUrl?`url(${artUrl})`:'linear-gradient(135deg,#5038a0,#121212)';
  return<div className={`exp-player${track?' open':'closed'}`}>
    <div className="exp-bg">
      {artUrl&&<div style={{position:'absolute',inset:0,backgroundImage:bg,backgroundSize:'cover',backgroundPosition:'center',filter:'blur(60px) brightness(.4)',transform:'scale(1.1)'}}/>}
      <div className="exp-bg-blur"/>
    </div>
    <div className="exp-header">
      <button className="exp-down-btn" onClick={onClose}>⌄</button>
      <div className="exp-title-area"><div className="exp-context">Now Playing</div></div>
      <button className="exp-more-btn" onClick={onSleep}>⏱</button>
    </div>
    <div className="exp-art-wrap">
      <div className="exp-art">{artUrl?<img src={artUrl} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} alt=""/>:'♪'}</div>
    </div>
    <div className="exp-info">
      <div className="exp-track-title">{track?.title||'Nothing playing'}</div>
      <div className="exp-track-artist">{track?.artist||''}</div>
    </div>
    <div className="exp-prog">
      <div className="exp-prog-track" onMouseDown={e=>{const r=e.currentTarget.getBoundingClientRect();onSeek(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)),true)}} onTouchEnd={e=>{e.preventDefault();const r=e.currentTarget.getBoundingClientRect();const t=e.changedTouches[0];onSeek(Math.max(0,Math.min(1,(t.clientX-r.left)/r.width)),true)}}>
        <div className="exp-prog-bg"><div className="exp-prog-fill" style={{width:`${pct*100}%`}}/></div>
      </div>
      <div className="exp-prog-times"><span>{fmt(pos)}</span><span>{fmt(dur)}</span></div>
    </div>
    <div className="exp-ctrl">
      <button className={`exp-btn${shuffle?' act':''}`} onClick={onShuffle}>⇌</button>
      <button className="exp-btn" onClick={onPrev}>⏮</button>
      <button className="exp-play" onClick={onToggle} disabled={loading}>{loading?<div className="spinner" style={{width:24,height:24}}/>:(isPlaying?'⏸':'▶')}</button>
      <button className="exp-btn" onClick={onNext}>⏭</button>
      <button className={`exp-btn${repeat?' act':''}`} onClick={onRepeat}>↻</button>
    </div>
    <div className="exp-extra">
      <button className="exp-extra-btn" onClick={onLyrics}><span>✦</span><span>Lyrics</span></button>
      <button className={`exp-extra-btn${isDownloaded?' act':''}`} onClick={onDownload}><span>↓</span><span>{isDownloaded?'Saved':'Save'}</span></button>
      {navigator.share&&<button className="exp-extra-btn" onClick={onShare}><span>↗</span><span>Share</span></button>}
      {sleepMins&&<div style={{textAlign:'center'}}><div style={{fontSize:11,color:'var(--green)',fontFamily:'JetBrains Mono',fontWeight:700}}>{sleepMins}m</div><div style={{fontSize:9,color:'var(--t2)',letterSpacing:.5}}>SLEEP</div></div>}
    </div>
  </div>;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const[view,setView]=useState('home');
  const[playlists,setPlaylists]=useState([]);
  const[selectedPl,setSelectedPl]=useState(null);
  const[toasts,setToasts]=useState([]);
  const[ctxMenu,setCtxMenu]=useState(null);
  const[modal,setModal]=useState(null);
  const[plPicker,setPlPicker]=useState(null);
  const[folderName,setFolderName]=useState(null);
  const[showFolderModal,setShowFolderModal]=useState(false);
  const[showSleepModal,setShowSleepModal]=useState(false);
  const[offlineKeys,setOfflineKeys]=useState([]);
  const[downloading,setDownloading]=useState(null);
  const[dlPct,setDlPct]=useState(0);
  const[expanded,setExpanded]=useState(false);
  const[recentlyPlayed,setRecentlyPlayed]=useState([]);
  const[sleepMins,setSleepMins]=useState(null);
  const sleepTimerRef=useRef(null);
  const isOnline=useOnline();
  const isMobile=useMobile();

  // ── Audio element ──────────────────────────────────────────────────────────
  const audioRef=useRef(null);
  if(!audioRef.current){const a=new Audio();a.className='_lily';a.preload='auto';document.body.appendChild(a);audioRef.current=a}

  const[currentTrack,setCurrentTrack]=useState(null);
  const[isPlaying,setIsPlaying]=useState(false);
  const[position,setPosition]=useState(0);
  const[duration,setDuration]=useState(0);
  const[volume,setVolume]=useState(.7);
  const[shuffle,setShuffle]=useState(false);
  const[repeat,setRepeat]=useState(false);
  const[loading,setLoading]=useState(false);
  const[queue,setQueue]=useState([]);
  const[queueIdx,setQueueIdx]=useState(-1);
  const playNextRef=useRef(null);
  const blobRef=useRef(null);

  // ── Init ───────────────────────────────────────────────────────────────────
  const refreshKeys=useCallback(async()=>{try{setOfflineKeys(await IDB.allKeys())}catch{}},[]);
  useEffect(()=>{refreshKeys();IDB.getSetting('folderName').then(n=>{if(n)setFolderName(n)}).catch(()=>{});
    // Load recently played
    try{const r=JSON.parse(localStorage.getItem('lily-recent')||'[]');setRecentlyPlayed(r)}catch{}
  },[]);

  // ── Audio event wiring ─────────────────────────────────────────────────────
  useEffect(()=>{
    const a=audioRef.current;a.volume=volume;
    const tUpdate=()=>{setPosition(a.currentTime);setMSPos(a.currentTime,a.duration)};
    const durChange=()=>setDuration(a.duration||0);
    const ended=()=>{if(playNextRef.current)playNextRef.current()};
    const onP=()=>{setIsPlaying(true);setMSState(true)};
    const onPs=()=>{setIsPlaying(false);setMSState(false)};
    a.addEventListener('timeupdate',tUpdate);a.addEventListener('loadedmetadata',durChange);a.addEventListener('durationchange',durChange);a.addEventListener('ended',ended);a.addEventListener('play',onP);a.addEventListener('pause',onPs);
    return()=>{a.removeEventListener('timeupdate',tUpdate);a.removeEventListener('loadedmetadata',durChange);a.removeEventListener('durationchange',durChange);a.removeEventListener('ended',ended);a.removeEventListener('play',onP);a.removeEventListener('pause',onPs)};
  },[]);
  useEffect(()=>{audioRef.current.volume=volume},[volume]);

  const loadPlaylists=()=>api.get('/api/playlists').then(setPlaylists).catch(()=>{});
  useEffect(()=>{loadPlaylists()},[]);

  const toast=useCallback((msg,type='success')=>{const id=Date.now();setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500)},[]);

  // ── Recently Played ────────────────────────────────────────────────────────
  const addRecent=useCallback(track=>{setRecentlyPlayed(prev=>{const next=[track,...prev.filter(t=>t.id!==track.id&&t.source_id!==track.source_id)].slice(0,20);try{localStorage.setItem('lily-recent',JSON.stringify(next))}catch{}return next})},[]);

  // ── Sleep Timer ────────────────────────────────────────────────────────────
  const setSleepTimer=useCallback(mins=>{
    if(sleepTimerRef.current){clearTimeout(sleepTimerRef.current);sleepTimerRef.current=null}
    setSleepMins(mins);
    if(mins){sleepTimerRef.current=setTimeout(()=>{audioRef.current.pause();setSleepMins(null);toast('😴 Sleep timer — music stopped','info')},mins*60*1000)}
  },[toast]);

  // ── Start Track ────────────────────────────────────────────────────────────
  const startTrack=useCallback(async(track,q=null,idx=0)=>{
    setLoading(true);if(q){setQueue(q);setQueueIdx(idx)}
    setCurrentTrack(track);setPosition(0);setDuration(0);
    const a=audioRef.current;
    if(blobRef.current){URL.revokeObjectURL(blobRef.current);blobRef.current=null}
    addRecent(track);
    try{
      let url;
      if(track._offlineUrl){url=track._offlineUrl}
      else{
        const cid=cacheId(track);
        const cached=await IDB.get(cid).catch(()=>null);
        if(cached){url=URL.createObjectURL(cached.blob);blobRef.current=url}
        else if(!navigator.onLine){toast('Not available offline','error');setLoading(false);return}
        else if(track.source==='local')url=`/api/stream/${track.id}`;
        else if(track.source==='saavn'){let ru=`/api/resolve/saavn/${encodeURIComponent(track.source_id)}`;if(track.stream_url)ru+=`?stream_url=${encodeURIComponent(track.stream_url)}`;const r=await api.get(ru);url=r.url;if(!url)throw new Error('No URL')}
        else if(track.source==='youtube'){const r=await api.get(`/api/resolve/youtube/${encodeURIComponent(track.source_id)}`);url=r.url;if(!url)throw new Error('No URL')}
      }
      a.src=url;a.load();await a.play();
      const artUrl=track.source==='local'&&track.id?`/api/artwork/${track.id}`:(track.image_url||null);
      setMS(track,artUrl,{play:()=>a.play(),pause:()=>a.pause(),prev:()=>{if(playNextRef._prev)playNextRef._prev()},next:()=>{if(playNextRef.current)playNextRef.current()},seekto:d=>{a.currentTime=d.seekTime??a.currentTime}});
    }catch(e){toast(`Playback failed: ${e.message}`,'error');setIsPlaying(false)}
    setLoading(false);
  },[toast,addRecent]);

  const playNext=useCallback(()=>{
    setRepeat(rpt=>{if(rpt){audioRef.current.currentTime=0;audioRef.current.play().catch(()=>{});return rpt}
      setQueue(q=>{setQueueIdx(i=>{if(!q.length)return i;const nxt=shuffle?Math.floor(Math.random()*q.length):(i+1)%q.length;startTrack(q[nxt],q,nxt);return nxt});return q});return rpt});
  },[shuffle,startTrack]);
  useEffect(()=>{playNextRef.current=playNext},[playNext]);

  const playPrev=useCallback(()=>{
    if(audioRef.current.currentTime>3){audioRef.current.currentTime=0;return}
    setQueue(q=>{setQueueIdx(i=>{if(!q.length)return i;const p=(i-1+q.length)%q.length;startTrack(q[p],q,p);return p});return q});
  },[startTrack]);
  useEffect(()=>{playNextRef._prev=playPrev},[playPrev]);

  const togglePlay=useCallback(()=>{const a=audioRef.current;if(!a.src&&queue.length){startTrack(queue[Math.max(0,queueIdx)],queue,Math.max(0,queueIdx));return}if(a.paused)a.play().catch(()=>{});else a.pause()},[queue,queueIdx,startTrack]);
  const onPlay=useCallback((track,tracks=null,idx=0)=>{const q=tracks||[track];setQueue(q);setQueueIdx(tracks?idx:0);startTrack(track,q,tracks?idx:0)},[startTrack]);
  const seek=useCallback((f,commit)=>{const t=f*duration;if(commit){audioRef.current.currentTime=t;setPosition(t)}else setPosition(t)},[duration]);
  const setVol=v=>{setVolume(v);audioRef.current.volume=v};

  // ── Download ───────────────────────────────────────────────────────────────
  const _doDownload=useCallback(async track=>{
    setDownloading(track.title||'Track');setDlPct(0);
    try{await downloadTrack(track,p=>setDlPct(p));toast(`✓ "${track.title}" saved offline`,'success');await refreshKeys()}
    catch(e){toast(`Download failed: ${e.message}`,'error')}
    setDownloading(null);
  },[toast,refreshKeys]);

  const handleDownload=useCallback(async track=>{
    const cid=cacheId(track);if(offlineKeys.includes(cid)){toast('Already downloaded','info');return}
    if(!FolderMgr.has()&&window.showDirectoryPicker){window._pdl=track;setShowFolderModal(true);return}
    _doDownload(track);
  },[offlineKeys,toast,_doDownload]);

  const onGrantFolder=useCallback(async()=>{setShowFolderModal(false);try{const h=await FolderMgr.request();if(h){setFolderName(h.name);toast(`📁 Folder: ${h.name}`,'success')}}catch{toast('Folder access denied','error')}if(window._pdl){const t=window._pdl;window._pdl=null;_doDownload(t)}},[toast,_doDownload]);
  const onSkipFolder=useCallback(()=>{setShowFolderModal(false);if(window._pdl){const t=window._pdl;window._pdl=null;_doDownload(t)}},[_doDownload]);

  // ── Share ──────────────────────────────────────────────────────────────────
  const shareTrack=useCallback(async track=>{
    if(navigator.share){try{await navigator.share({title:track.title,text:`${track.title} by ${track.artist} — via Lily Music 🌸`});return}catch{}}
    // Fallback: copy to clipboard
    try{await navigator.clipboard.writeText(`${track.title} by ${track.artist}`);toast('Copied to clipboard','success')}catch{toast('Share not available','error')}
  },[toast]);

  // ── Context Menu ───────────────────────────────────────────────────────────
  const showCtx=useCallback((e,track)=>{
    e.preventDefault();
    const cid=cacheId(track);const isDl=offlineKeys.includes(cid);
    const items=[
      {icon:'▶',label:'Play Now',action:()=>onPlay(track)},
      {icon:'≡',label:'Add to Queue',action:()=>setQueue(q=>{const nq=[...q,track];if(nq.length===1)startTrack(track,nq,0);toast('Added to queue');return nq})},
      null,
      isDl?{icon:'✓',label:'Downloaded',accent:true,action:()=>{}}:{icon:'↓',label:'Download for Offline',accent:true,action:()=>handleDownload(track)},
      isDl?{icon:'✕',label:'Remove Download',danger:true,action:async()=>{await IDB.del(cid);await refreshKeys();toast('Removed download')}}:null,
      null,
      {icon:'♫',label:'Add to Playlist',action:()=>setPlPicker(track)},
      navigator.share||navigator.clipboard?{icon:'↗',label:'Share',action:()=>shareTrack(track)}:null,
      track.source==='local'?{icon:'🗑',label:'Delete from Library',danger:true,action:async()=>{await api.del(`/api/tracks/${track.id}`);toast('Deleted')}}:null,
    ].filter(Boolean);
    setCtxMenu({x:e.clientX,y:e.clientY,items});
  },[onPlay,offlineKeys,handleDownload,refreshKeys,toast,startTrack,shareTrack]);

  const createPlaylist=name=>{api.post('/api/playlists',{name}).then(()=>{loadPlaylists();toast(`✓ Playlist created`);setModal(null)})};
  const addToPlaylist=async plId=>{if(!plPicker)return;await api.post(`/api/playlists/${plId}/tracks`,{track_id:plPicker.id});toast('Added to playlist');setPlPicker(null);loadPlaylists()};
  const handleAddFiles=async files=>{if(!files.length)return;try{const r=await api.upload(Array.from(files));toast(`✓ Added ${r.added} track${r.added!==1?'s':''}`,'success')}catch{toast('Upload failed','error')}};
  const nav=v=>{setView(v);setSelectedPl(null)};

  const isTrackDownloaded=currentTrack&&offlineKeys.includes(cacheId(currentTrack));

  return<div id="root-app" className="app" onClick={()=>setCtxMenu(null)}>
    <div className="app-body">
      <Sidebar view={view} onNav={nav} playlists={playlists} selectedPl={selectedPl}
        onPlaylist={p=>{setSelectedPl(p.id);setView('playlist')}} onNewPlaylist={()=>setModal({type:'create'})}
        onAddFiles={handleAddFiles} isOnline={isOnline}/>
      <div className="main">
        <div className="topbar">
          <div className="topbar-nav">
            <button className="t-nav-btn" onClick={()=>window.history.back()}>‹</button>
            <button className="t-nav-btn" onClick={()=>window.history.forward()}>›</button>
          </div>
          <div className="topbar-right">
            {!isOnline&&<span className="offline-pill">OFFLINE</span>}
            <button className={`folder-btn${folderName?' set':''}`} onClick={async()=>{if(!window.showDirectoryPicker){toast('Not supported in this browser','error');return}const h=await FolderMgr.request();if(h){setFolderName(h.name);toast(`📁 ${h.name}`,'success')}}}>
              {folderName?`📂 ${folderName}`:'📁 Download Folder'}
            </button>
          </div>
        </div>
        {view==='home'     &&<HomePage onPlay={onPlay} recentlyPlayed={recentlyPlayed}/>}
        {view==='library'  &&<LibraryPage currentTrack={currentTrack} onPlay={(t,i,ts)=>onPlay(t,ts,i)} onCtx={showCtx} toast={toast} offlineKeys={offlineKeys}/>}
        {view==='search'   &&<SearchPage currentTrack={currentTrack} onPlay={onPlay} onCtx={showCtx}/>}
        {view==='playlist' &&selectedPl&&<PlaylistPage playlist={playlists.find(p=>p.id===selectedPl)} onPlay={(t,ts,i)=>onPlay(t,ts,i)} onCtx={showCtx} onBack={()=>setView('home')} offlineKeys={offlineKeys}/>}
        {view==='queue'    &&<QueuePage queue={queue} queueIdx={queueIdx}
          onPlayIdx={i=>{setQueueIdx(i);startTrack(queue[i],queue,i)}}
          onRemove={i=>{const q=[...queue];q.splice(i,1);setQueue(q);if(queueIdx>=i&&queueIdx>0)setQueueIdx(x=>x-1)}}
          onClear={()=>{setQueue([]);setQueueIdx(-1);audioRef.current.pause();setCurrentTrack(null);setIsPlaying(false)}}/>}
        {view==='lyrics'   &&<LyricsPage currentTrack={currentTrack} position={position}/>}
        {view==='downloads'&&<DownloadsPage onPlay={onPlay} currentTrack={currentTrack}/>}
      </div>
    </div>
    <div className="app-player">
      <PlayerBar track={currentTrack} isPlaying={isPlaying} pos={position} dur={duration}
        vol={volume} shuffle={shuffle} repeat={repeat} sleepMins={sleepMins}
        onToggle={togglePlay} onPrev={playPrev} onNext={playNext}
        onSeek={seek} onVol={setVol} onShuffle={()=>setShuffle(s=>!s)} onRepeat={()=>setRepeat(r=>!r)}
        loading={loading} onQueue={()=>nav('queue')} onLyrics={()=>nav('lyrics')}
        onSleep={()=>setShowSleepModal(true)} onExpand={()=>isMobile&&setExpanded(true)}/>
    </div>

    {/* Mobile player + expanded */}
    <MobilePlayer track={currentTrack} isPlaying={isPlaying} pos={position} dur={duration}
      onToggle={togglePlay} onPrev={playPrev} onNext={playNext} onSeek={seek} loading={loading}
      onExpand={()=>setExpanded(true)}/>
    <BottomNav view={view} onNav={nav}/>

    <ExpandedPlayer track={currentTrack} isPlaying={isPlaying} pos={position} dur={duration}
      vol={volume} shuffle={shuffle} repeat={repeat} loading={loading} sleepMins={sleepMins}
      onClose={()=>setExpanded(false)} onToggle={togglePlay} onPrev={playPrev} onNext={playNext}
      onSeek={seek} onVol={setVol} onShuffle={()=>setShuffle(s=>!s)} onRepeat={()=>setRepeat(r=>!r)}
      onSleep={()=>setShowSleepModal(true)} onDownload={()=>currentTrack&&handleDownload(currentTrack)}
      onShare={()=>currentTrack&&shareTrack(currentTrack)} onLyrics={()=>{setExpanded(false);nav('lyrics')}}
      isDownloaded={isTrackDownloaded}/>
    {/* Hide expanded on desktop */}
    {!isMobile&&expanded&&setExpanded(false)&&null}

    <Toasts items={toasts}/>
    {ctxMenu&&<CtxMenu x={ctxMenu.x} y={ctxMenu.y} items={ctxMenu.items} onClose={()=>setCtxMenu(null)}/>}
    {modal?.type==='create'&&<Modal title="Create Playlist" desc="Name your playlist" placeholder="My Playlist" onOk={createPlaylist} onClose={()=>setModal(null)}/>}
    {plPicker&&<PlPicker playlists={playlists} onPick={addToPlaylist} onClose={()=>setPlPicker(null)}/>}
    {showFolderModal&&<FolderModal onGrant={onGrantFolder} onSkip={onSkipFolder}/>}
    {showSleepModal&&<SleepModal currentMins={sleepMins} onSet={setSleepTimer} onClose={()=>setShowSleepModal(false)}/>}
    {downloading&&<>
      <div className="dl-progress"><div className="spinner"/>Downloading "{downloading}"… {Math.round(dlPct*100)}%</div>
      <div className="dl-progress-bar" style={{bottom:'calc(var(--player-h) + 58px)'}}><div className="dl-progress-fill" style={{width:`${dlPct*100}%`}}/></div>
    </>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
